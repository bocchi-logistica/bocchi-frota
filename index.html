<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Bocchi Frota — Portal do Motorista e ADM Logística (v1.3 — Edson.B)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --mata:#173F2E; --folha:#2D6A4F; --folha-clara:#E3EFE7; --colheita:#F2B705; --colheita-escura:#B78900;
  --papel:#F6F5F0; --branco:#FFFFFF; --tinta:#20261F; --cinza:#6B7267; --linha:#DDDDD2;
  --erro:#B3401F; --erro-claro:#F9E8E1; --ok:#2D6A4F; --aviso:#FDF3D7;
  --r:14px; --sombra:0 1px 3px rgba(23,63,46,.10), 0 6px 20px rgba(23,63,46,.06);
}
*{box-sizing:border-box; margin:0}
html,body{height:100%}
body{font-family:'Public Sans',system-ui,sans-serif; background:var(--papel); color:var(--tinta); font-size:15px; line-height:1.45}
h1,h2,h3,h4,.disp{font-family:'Archivo',sans-serif}
button{font-family:inherit; cursor:pointer; border:none; background:none; font-size:inherit}
input,select,textarea{font-family:inherit; font-size:15px; padding:11px 12px; border:1.5px solid var(--linha); border-radius:10px; background:var(--branco); color:var(--tinta); width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--folha); outline-offset:1px; border-color:var(--folha)}
label{font-size:12.5px; font-weight:600; color:var(--cinza); display:block; margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em}
.num{font-variant-numeric:tabular-nums}
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 18px; border-radius:11px; font-weight:700; font-family:'Archivo'; letter-spacing:.01em; transition:transform .06s}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--mata); color:#fff}
.btn-s{background:var(--folha-clara); color:var(--mata)}
.btn-d{background:var(--erro); color:#fff}
.btn-g{background:transparent; color:var(--cinza); border:1.5px solid var(--linha)}
.btn-sm{padding:7px 12px; font-size:13px; border-radius:9px}
.card{background:var(--branco); border-radius:var(--r); box-shadow:var(--sombra); padding:16px}
.tag{display:inline-block; padding:3px 9px; border-radius:99px; font-size:11.5px; font-weight:700; letter-spacing:.03em}
.tag-pend{background:var(--aviso); color:#7A5D00}
.tag-ok{background:var(--folha-clara); color:var(--mata)}
.tag-neg{background:var(--erro-claro); color:var(--erro)}
.tag-neutro{background:#EDEDE5; color:var(--cinza)}
.muted{color:var(--cinza); font-size:13px}
.row{display:flex; align-items:center; gap:10px}
.grow{flex:1}
.divider{height:1px; background:var(--linha); margin:12px 0}

/* ---------- LOGIN ---------- */
.login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg, var(--mata) 0%, #0F2B1F 100%); padding:20px}
.login-card{width:100%; max-width:400px; background:var(--branco); border-radius:20px; padding:32px 28px; box-shadow:0 20px 60px rgba(0,0,0,.35)}
.marca{font-family:'Archivo'; font-weight:800; font-size:30px; color:var(--mata); letter-spacing:-.02em}
.marca em{font-style:normal; color:var(--colheita-escura)}
.logo-login{display:block;width:170px;max-width:65%;height:auto;margin:0 auto 16px}
.login-sub{color:var(--cinza); font-size:13.5px; margin:4px 0 24px}
.hint{background:var(--papel); border:1px dashed var(--linha); border-radius:10px; padding:10px 12px; font-size:12.5px; color:var(--cinza); margin-top:16px}

/* ---------- SHELL MOTORISTA ---------- */
.mshell{max-width:520px; margin:0 auto; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; background:var(--papel)}
.mtop{background:var(--mata); color:#fff; padding:14px 16px 12px; position:sticky; top:0; z-index:20}
.mtop .nome{font-family:'Archivo'; font-weight:700; font-size:17px}
.mtop .sub{font-size:12px; opacity:.75}
.chip-placa{background:rgba(255,255,255,.14); border-radius:8px; padding:4px 10px; font-family:'Archivo'; font-weight:700; font-size:13px; letter-spacing:.06em}
.mbody{flex:0 0 auto; padding:14px; display:flex; flex-direction:column; gap:12px}
.mtabs{position:sticky; bottom:0; margin-top:0; width:100%; max-width:520px; background:var(--branco); border-top:1px solid var(--linha); display:flex; z-index:30; padding-bottom:env(safe-area-inset-bottom)}
.mtab{flex:1; padding:10px 4px 12px; text-align:center; color:var(--cinza); font-size:11.5px; font-weight:600}
.mtab .ic{font-size:21px; display:block; margin-bottom:2px}
.mtab.on{color:var(--mata)}
.mtab.on .ic{transform:translateY(-1px)}
.seletor-mes{display:flex; gap:6px; overflow-x:auto; padding-bottom:2px}
.mes-pill{padding:8px 14px; border-radius:99px; background:var(--branco); border:1.5px solid var(--linha); font-family:'Archivo'; font-weight:700; font-size:13px; white-space:nowrap; color:var(--cinza)}
.mes-pill.on{background:var(--mata); border-color:var(--mata); color:#fff}
.totais{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
.totais .card{padding:12px 10px; text-align:center}
.totais .v{font-family:'Archivo'; font-weight:800; font-size:19px; color:var(--mata)}
.totais .l{font-size:11px; color:var(--cinza); font-weight:600; text-transform:uppercase; letter-spacing:.04em}
.carga{padding:12px 14px}
.carga .rota{font-family:'Archivo'; font-weight:700; font-size:14.5px}
.carga .seta{color:var(--colheita-escura)}
.carga .meta-l{font-size:12.5px; color:var(--cinza); margin-top:2px}
.carga .valor{font-family:'Archivo'; font-weight:800; font-size:16px; color:var(--mata)}

/* ---------- RÉGUA DA PREMIAÇÃO (assinatura) ---------- */
.regua-wrap{padding:20px 16px 14px}
.regua{position:relative; height:14px; border-radius:99px; background:#E9E8DF; margin:34px 6px 30px}
.regua .fill{position:absolute; inset:0 auto 0 0; border-radius:99px; background:linear-gradient(90deg, var(--folha), var(--mata)); transition:width .6s cubic-bezier(.2,.8,.2,1)}
.regua .fill.alem{background:linear-gradient(90deg, var(--folha), var(--colheita-escura))}
.marco{position:absolute; top:-9px; bottom:-9px; width:3px; background:var(--tinta); border-radius:2px}
.marco .flag{position:absolute; top:-24px; left:50%; transform:translateX(-50%); font-size:10.5px; font-weight:800; font-family:'Archivo'; letter-spacing:.05em; white-space:nowrap; background:var(--tinta); color:#fff; padding:2px 7px; border-radius:6px}
.marco.meta{background:var(--colheita-escura)}
.marco.meta .flag{background:var(--colheita); color:#5C4500; top:auto; bottom:-26px}
.caminhao{position:absolute; top:-15px; transform:translateX(-50%); font-size:22px; transition:left .6s cubic-bezier(.2,.8,.2,1); filter:drop-shadow(0 2px 2px rgba(0,0,0,.25))}
.grande{font-family:'Archivo'; font-weight:800; font-size:30px; letter-spacing:-.01em}
.linha-item{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--linha); font-size:14px}
.linha-item:last-child{border-bottom:none}
.quad-mes{display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-radius:10px; background:var(--papel); margin-bottom:6px}
.quad-mes.on{outline:2px solid var(--folha)}

/* ---------- CHECKLIST ---------- */
.perg{padding:13px 14px}
.perg .txt{font-weight:600; font-size:14.5px}
.resp-btns{display:flex; gap:8px; margin-top:10px}
.resp-btn{flex:1; padding:10px 6px; border-radius:10px; border:1.5px solid var(--linha); font-weight:700; font-family:'Archivo'; font-size:13px; background:var(--branco); color:var(--cinza)}
.resp-btn.c.on{background:var(--folha-clara); border-color:var(--folha); color:var(--mata)}
.resp-btn.nc.on{background:var(--erro-claro); border-color:var(--erro); color:var(--erro)}
.resp-btn.na.on{background:#EDEDE5; border-color:var(--cinza); color:var(--tinta)}
.foto-thumb{width:74px; height:74px; object-fit:cover; border-radius:10px; border:1.5px solid var(--linha)}
.foto-add{width:74px; height:74px; border-radius:10px; border:1.5px dashed var(--linha); display:flex; align-items:center; justify-content:center; color:var(--cinza); font-size:24px; background:var(--branco)}
.foto-clicavel{cursor:zoom-in; transition:transform .15s, box-shadow .15s}
.foto-clicavel:hover{transform:scale(1.03); box-shadow:0 4px 14px #0002}
.visualizador-foto{position:fixed; inset:0; z-index:3000; background:#111e; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:18px}
.visualizador-foto img{max-width:min(1100px,96vw); max-height:78vh; object-fit:contain; background:#fff; border-radius:10px; box-shadow:0 12px 40px #0008}
.visualizador-foto-acoes{display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; justify-content:center}

/* ---------- SHELL ADM ---------- */
.ashell{min-height:100vh; display:flex; flex-direction:column}
.atop{background:var(--mata); color:#fff; padding:0 18px}
.atop-in{max-width:1180px; margin:0 auto; display:flex; align-items:center; gap:18px; flex-wrap:wrap}
.atop .marca{color:#fff; font-size:20px; padding:14px 0}
.atop .marca em{color:var(--colheita)}
.anav{display:flex; gap:2px; overflow-x:auto}
.anav button{padding:14px 13px; color:rgba(255,255,255,.72); font-weight:600; font-size:13.5px; border-bottom:3px solid transparent; white-space:nowrap}
.anav button.on{color:#fff; border-bottom-color:var(--colheita)}
.abody{flex:1; max-width:1180px; width:100%; margin:0 auto; padding:20px 18px 60px; display:flex; flex-direction:column; gap:14px}
table{width:100%; border-collapse:collapse; font-size:13.5px}
th{text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--cinza); font-weight:700; padding:8px 10px; border-bottom:2px solid var(--linha)}
td{padding:9px 10px; border-bottom:1px solid var(--linha); vertical-align:middle}
tr:last-child td{border-bottom:none}
.td-num{text-align:right}
th.td-num{text-align:right}
.subtabs{display:flex; gap:6px; flex-wrap:wrap}
.subtab{padding:8px 14px; border-radius:99px; border:1.5px solid var(--linha); background:var(--branco); font-weight:700; font-family:'Archivo'; font-size:13px; color:var(--cinza)}
.subtab.on{background:var(--mata); border-color:var(--mata); color:#fff}
.cards4{display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:10px}
.kpi .l{font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--cinza); font-weight:700}
.kpi .v{font-family:'Archivo'; font-weight:800; font-size:24px; color:var(--mata); margin-top:2px}
.drop{border:2px dashed var(--linha); border-radius:var(--r); padding:34px 20px; text-align:center; color:var(--cinza); background:var(--branco)}
.form-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px}

/* ---------- MODAL / TOAST ---------- */
.overlay{position:fixed; inset:0; background:rgba(20,30,24,.55); display:flex; align-items:flex-end; justify-content:center; z-index:100; padding:0}
@media(min-width:640px){.overlay{align-items:center; padding:20px}}
.modal{background:var(--branco); width:100%; max-width:480px; border-radius:20px 20px 0 0; padding:22px 20px; max-height:88vh; overflow-y:auto}
@media(min-width:640px){.modal{border-radius:20px}}
.modal h3{margin-bottom:12px}
.toast{position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--tinta); color:#fff; padding:11px 18px; border-radius:99px; font-weight:600; font-size:13.5px; z-index:200; box-shadow:var(--sombra); white-space:nowrap; max-width:92vw; overflow:hidden; text-overflow:ellipsis}
.aviso-box{background:var(--aviso); border-radius:10px; padding:10px 12px; font-size:12.5px; color:#6B5200}
.erro-box{background:var(--erro-claro); border-radius:10px; padding:10px 12px; font-size:13px; color:var(--erro)}
@media(prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important}}
</style>
</head>

/* ============================================================================

function gerarUUID(){
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  // Alternativa quando crypto.randomUUID não existe (navegadores antigos)
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c=>{
    const r = Math.random()*16|0, v = c==='x' ? r : (r&0x3|0x8);
    return v.toString(16);
  });
}
async function fetchComTimeout(url, options = {}, timeout = CONFIG.TIMEOUT_MS){
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), timeout);
  try{
    return await fetch(url, {...options, signal: controller.signal});
  } finally {
    clearTimeout(timer);

/* ============================================================================
   ALTERAÇÃO V6 — INDEXEDDB (fila de envio local + rascunho)
   Status locais: RASCUNHO, PENDENTE, ENVIANDO, ENVIADO, ERRO
   ========================================================================== */
const IDB = {
  _db: null,
  abrir(){
    if (this._db) return Promise.resolve(this._db);
    return new Promise((res, rej)=>{
      const rq = indexedDB.open('bocchi_frota', 1);
      rq.onupgradeneeded = e=>{
        const db = e.target.result;
        if(!db.objectStoreNames.contains('fila'))     db.createObjectStore('fila',     {keyPath:'idLocal'});
        if(!db.objectStoreNames.contains('rascunho')) db.createObjectStore('rascunho', {keyPath:'chave'});
      };
      rq.onsuccess = e=>{ this._db = e.target.result; res(this._db); };
      rq.onerror = ()=>rej(rq.error);
    });
  },
  _tx(store, mode, fn){
    return this.abrir().then(db=>new Promise((res, rej)=>{
      const tx = db.transaction(store, mode);
      const st = tx.objectStore(store);
      const out = fn(st);
      tx.oncomplete = ()=>res(out && out.result !== undefined ? out.result : undefined);
      tx.onerror = ()=>rej(tx.error);
    }));
  },
  salvarFila(item){ return this._tx('fila','readwrite', st=>st.put(item)); },
  removerFila(idLocal){ return this._tx('fila','readwrite', st=>st.delete(idLocal)); },
  listarFila(){
    return this.abrir().then(db=>new Promise((res, rej)=>{
      const rq = db.transaction('fila','readonly').objectStore('fila').getAll();
      rq.onsuccess = ()=>res(rq.result||[]);
      rq.onerror = ()=>rej(rq.error);
    }));
  },
  listarRascunhos(){
    return this.abrir().then(db=>new Promise((res, rej)=>{
      const rq = db.transaction('rascunho','readonly').objectStore('rascunho').getAll();
      rq.onsuccess = ()=>res(rq.result||[]);
      rq.onerror = ()=>rej(rq.error);
    }));
  },
  salvarRascunho(chave, dados){ return this._tx('rascunho','readwrite', st=>st.put({chave, dados, quando: agoraISO()})); },
  lerRascunho(chave){
    return this.abrir().then(db=>new Promise((res)=>{
      const rq = db.transaction('rascunho','readonly').objectStore('rascunho').get(chave);
      rq.onsuccess = ()=>res(rq.result ? rq.result.dados : null);
      rq.onerror = ()=>res(null);
    }));
  },
  apagarRascunho(chave){ return this._tx('rascunho','readwrite', st=>st.delete(chave)); }
};

/* ============================================================================
   ALTERAÇÃO V6 — FOTOS (compressão antes do envio)
   Redimensiona para no máximo CONFIG.FOTO_MAX_PX no maior lado,
   converte para JPEG qualidade CONFIG.QUALIDADE_FOTO e valida o tamanho.
   Isolada de propósito: se o backend passar a aceitar multipart/form-data,
   basta trocar o retorno de Base64 por Blob aqui.
   ========================================================================== */
function comprimirImagem(arquivo){
  return new Promise((res, rej)=>{
    const url = URL.createObjectURL(arquivo);
    const img = new Image();
    img.onload = ()=>{
      try{
        let {width:w, height:h} = img;
        const maior = Math.max(w, h);
        if (maior > CONFIG.FOTO_MAX_PX){
          const esc = CONFIG.FOTO_MAX_PX / maior;
          w = Math.round(w*esc); h = Math.round(h*esc);
        }
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        const b64 = cv.toDataURL('image/jpeg', CONFIG.QUALIDADE_FOTO);
        URL.revokeObjectURL(url);
        const tamanhoMB = (b64.length*0.75)/1048576; // aprox. bytes do Base64
        if (tamanhoMB > CONFIG.MAX_FOTO_MB){
          rej(new Error('Foto muito grande mesmo após compressão ('+tamanhoMB.toFixed(1)+' MB). Tente uma foto mais próxima do problema.'));
          return;
        }
        res(b64);
      }catch(e){ URL.revokeObjectURL(url); rej(e); }
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); rej(new Error('Não foi possível ler a imagem.')); };
    img.src = url;
  });
}

/* ============================================================================
   ALTERAÇÃO V6 — FILA DE ENVIO (internet instável)
   O checklist é gravado no IndexedDB ANTES da tentativa de envio.
   Só é marcado como ENVIADO com confirmação real da API (protocolo).
   O mesmo idLocal é mantido em todas as tentativas (idempotência).
   ========================================================================== */
const FilaEnvio = {
  _processando: false,
  ouvintes: new Set(),
  _notificar(){ this.ouvintes.forEach(f=>{ try{f();}catch(e){} }); },
  validar(registro){
    const faltando = [];
    if(!String(registro?.idLocal||'').trim()) faltando.push('identificador');
    if(!String(registro?.motorista?.nome||'').trim()) faltando.push('motorista');
    if(!String(registro?.motorista?.login||'').trim()) faltando.push('login');
    if(!String(registro?.veiculo?.placa||'').trim()) faltando.push('placa');
    if(!Array.isArray(registro?.respostas) || !registro.respostas.length) faltando.push('respostas');
    return faltando;
  },
  _loginDono(registro){
    return String(registro?.donoLogin || registro?.motorista?.login || '').trim().toLowerCase();
  },
  async adicionar(registro){
    const faltando = this.validar(registro);
    if(faltando.length) throw new Error('Não foi possível salvar: faltam '+faltando.join(', ')+'.');
    // Vincula definitivamente o registro ao usuário que o criou neste aparelho.
    // Isso impede que outro motorista veja ou envie a fila após uma troca de login.
    registro.donoLogin = this._loginDono(registro);
    registro.statusEnvio = 'PENDENTE';
    registro.tentativas = 0;
    await IDB.salvarFila(registro);
    this._notificar();
  },
  async pendentes(loginDono){
    const todos = await IDB.listarFila();
    const login = String(loginDono||'').trim().toLowerCase();
    if(!login) return [];
    return todos.filter(x=>x.statusEnvio!=='ENVIADO' && this._loginDono(x)===login);
  },
  async sanear(loginDono){
    const login = String(loginDono||'').trim().toLowerCase();
    if(!login) return {removidos:0};
    const todos = await IDB.listarFila();
    let removidos = 0;
    for(const item of todos){
      if(this._loginDono(item)!==login) continue;
      const irrecuperavel = this.validar(item).length>0 || item.statusEnvio==='DADOS_INCOMPLETOS';
      if(irrecuperavel){ await IDB.removerFila(item.idLocal); removidos++; }
    }
    if(removidos) this._notificar();
    return {removidos};
  },
  async processar(toast, loginDono){
    const login = String(loginDono||'').trim().toLowerCase();
    if(!login) return;
    // Um temporizador de uma sessão anterior pode disparar depois da troca de
    // motorista. Nesse caso ele é encerrado sem acessar nem enviar o registro.
    if(!CONFIG.MODO_DEMONSTRACAO && ApiService.loginAtual!==login) return;
    if (this._processando) return; // evita tentativas simultâneas
    this._processando = true;
    try{
      const fila = await this.pendentes(login);
      for (const item of fila){
        const faltando = this.validar(item);
        if(faltando.length){
          item.statusEnvio = 'DADOS_INCOMPLETOS';
          item.ultimoErro = 'Registro antigo incompleto: faltam '+faltando.join(', ')+'. Exclua e refaça o checklist.';
          await IDB.salvarFila(item); this._notificar();
          continue;
        }
        item.statusEnvio = 'ENVIANDO';
        await IDB.salvarFila(item); this._notificar();
        try{
          const resp = await ApiService.enviarChecklist(item);
          if (resp && resp.sucesso===true && resp.protocolo){
            item.statusEnvio = 'ENVIADO';
            item.protocolo = resp.protocolo;
            item.dataHoraRecebimento = resp.dataHoraRecebimento;
            await IDB.salvarFila(item);
            if (toast) toast('Checklist enviado. Protocolo: '+resp.protocolo);
          } else {
            throw new Error((resp && resp.mensagem) || 'Resposta inválida da API');
          }
        }catch(e){
          item.tentativas = (item.tentativas||0)+1;
          item.ultimoErro = e.message;
          item.statusEnvio = item.tentativas >= CONFIG.MAX_TENTATIVAS ? 'ERRO' : 'PENDENTE';
          await IDB.salvarFila(item);
          // Agenda nova tentativa com intervalo crescente
          if (item.statusEnvio==='PENDENTE'){
            const delay = CONFIG.RETRY_DELAYS_MS[Math.min(item.tentativas, CONFIG.RETRY_DELAYS_MS.length-1)];
            setTimeout(()=>this.processar(toast, login), delay);
          }
        }
        this._notificar();
      }
    } finally {
      this._processando = false;
    }
  }
};

/* Régua da política POL 4.1.1 */
function calcProdutividade(fat, meta){
  if(!meta || !fat || fat < meta.start) return 0;
  if(fat < meta.meta) return meta.pctStart/100 * (fat - meta.start);
  return Math.min(meta.valorMeta + meta.pctMeta/100 * (fat - meta.meta), meta.teto);
}
function metaDoTipo(metas, tipo, mes){
  // mes 'MM/AAAA' -> usa vigência
  const ref = mes ? mes.slice(3)+'-'+mes.slice(0,2)+'-15' : '2026-06-15';
  const tipoBusca=chaveTipo(tipo);
  return metas.find(m => chaveTipo(m.tipo)===tipoBusca && m.vigIni<=ref && m.vigFim>=ref) ||
         metas.find(m=>chaveTipo(m.tipo)===tipoBusca);
}

/* Faturamento por motorista/mês: resumos (jan–abr) + cargas detalhadas (mai em diante) */
function usarDadosMensais(st){
  return useMemo(()=>{
    const map = {}; // mot -> mes -> {fat,n,peso,detalhe:boolean}
    st.resumos.forEach(r=>{
      map[r.m] = map[r.m] || {};
      map[r.m][r.mes] = {fat:r.fat, n:r.n, peso:r.peso, detalhe:false};
    });
    st.cargas.forEach(c=>{
      const mes = mesDaData(c.data);
      map[c.motorista] = map[c.motorista] || {};
      const cur = map[c.motorista][mes] || {fat:0,n:0,peso:0,detalhe:true};
      cur.fat += c.valor; cur.n += 1; cur.peso += c.peso; cur.detalhe = true;
      map[c.motorista][mes] = cur;
    });
    return map;
  },[st.resumos, st.cargas]);
}

  const cargaComTipo = [...st.cargas].reverse().find(c=>c.motorista===motNome && c.tipoVeiculo);
  const tipo = cargaComTipo ? cargaComTipo.tipoVeiculo : (placa ? placa.tipo : null);
  const meta = tipo ? metaDoTipo(st.metas, tipo, mes) : null;
  const d = (dados[motNome]||{})[mes];
  const fat = d ? d.fat : 0;
  const prod = calcProdutividade(fat, meta);
  const descs = st.descontos.filter(x=>x.motorista===motNome && x.mes===mes);
  const totDesc = descs.reduce((s,x)=>s+x.valor,0);
  return {fat, prod, descs, totDesc, apurado: prod + totDesc, meta, tipo, temDados: !!d, nCargas: d?d.n:0, peso: d?d.peso:0, detalhe: d?d.detalhe:false};
}

/* ================= COMPONENTES BASE ================= */
function Toast({msg}){ return msg ? <div className="toast">{msg}</div> : null; }
function Modal({titulo, onClose, children}){
  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget) onClose();}}>
      <div className="modal">
        <div className="row" style={{marginBottom:8}}>
          <h3 className="grow">{titulo}</h3>
          <button className="btn btn-g btn-sm" onClick={onClose}>Fechar</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function StatusTag({s}){
  const m = {pendente:['tag-pend','Pendente'], aprovado:['tag-ok','Aprovado'], reprovado:['tag-neg','Reprovado'],
    procede:['tag-ok','Procede — corrigir'], nao_procede:['tag-neutro','Não procede'], corrigida:['tag-ok','Corrigida']};
  const [cls,txt] = m[s] || ['tag-neutro', s];
  return <span className={'tag '+cls}>{txt}</span>;
}

function Login({st, onLogin}){
  const [login,setLogin]=useState(''); const [senha,setSenha]=useState(''); const [erro,setErro]=useState('');
  const [senhaLoginVisivel,setSenhaLoginVisivel]=useState(false);
  /* ALTERAÇÃO V6: em produção a autenticação é feita pelo endpoint POST /auth/login
     da API (o token fica só em memória; a senha nunca é gravada no navegador).
     O modo demonstração usa a base local e está claramente separado. */
  const [carregando,setCarregando]=useState(false);
  const entrar = async ()=>{
    setErro('');
    if (CONFIG.MODO_DEMONSTRACAO){
      const u = st.usuarios.find(x=>x.login===login.trim().toLowerCase());
      if(!u){ setErro('Usuário ou senha incorretos.'); return; }
      onLogin(u);
      return;
    }
    setCarregando(true);
    try{
      const r = await ApiService.login(login.trim().toLowerCase(), senha);
      if(!r || !r.sucesso){ setErro('Usuário ou senha incorretos.'); return; }
     onLogin({
  id: 'api' + r.motorista.id,
  nome: r.motorista.nome,
  login: r.motorista.login || login.trim().toLowerCase(),
  perfil: r.motorista.perfil || 'motorista',
  perms: r.motorista.perms || {
    cargas: true,
    premiacao: true,
    checklist: true
  },
  veiculoPadrao: r.motorista.veiculoPadrao || '',
  acessos: r.motorista.acessos || {}
});
    }catch(e){
      setErro('Não foi possível conectar ao servidor. Verifique a internet e tente novamente.');
    }finally{ setCarregando(false); }
  };
  return (
    <div className="login-wrap">
      <div className="login-card">
        <img src={LOGO} className="logo-login" alt="Bocchi Agrobios"/>
        <div className="login-sub">Portal do motorista e ADM logística — v1.3 — Edson.B</div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div><label>Usuário</label><input value={login} onChange={e=>setLogin(e.target.value)} placeholder="ex.: adelir" autoCapitalize="none"/></div>
          <div>
            <label>Senha</label>
            <div className="row" style={{gap:8}}>
              <input className="grow" type={senhaLoginVisivel?'text':'password'} value={senha} onChange={e=>setSenha(e.target.value)} onKeyDown={e=>e.key==='Enter'&&entrar()} placeholder="••••" autoComplete="current-password"/>
              <button type="button" className="btn btn-s btn-sm" onClick={()=>setSenhaLoginVisivel(v=>!v)} title={senhaLoginVisivel?'Ocultar senha':'Visualizar senha'} aria-label={senhaLoginVisivel?'Ocultar senha':'Visualizar senha'} style={{minWidth:72}}>{senhaLoginVisivel?'Ocultar':'Ver'}</button>
            </div>
          </div>
          {erro && <div className="erro-box">{erro}</div>}
          <button className="btn btn-p" disabled={carregando} onClick={entrar}>{carregando?'Entrando...':'Entrar'}</button>
        </div>
        {CONFIG.MODO_DEMONSTRACAO && <div className="hint">
          <b>MODO DEMONSTRAÇÃO ativo</b> — selecione um usuário cadastrado para navegar sem gravar no SharePoint.
        </div>}
      </div>
    </div>
  );
}

/* ================= MOTORISTA: CARGAS ================= */
function TelaCargas({st, setSt, user, dados, toast}){
  const [mes,setMes]=useState(MES_ATUAL);
  const [contestar,setContestar]=useState(null);
  const [motivo,setMotivo]=useState('');
  const ap = apuracaoMes(st, dados, user.nome, mes);
  const cargasMes = st.cargas.filter(c=>c.motorista===user.nome && mesDaData(c.data)===mes)
    .sort((a,b)=>b.data.localeCompare(a.data));
  const contestDaCarga = id => st.contestacoes.find(c=>c.cargaId===id && c.motorista===user.nome);
  const enviar=()=>{
    if(!motivo.trim()){ toast('Descreva o que está errado na carga.'); return; }
    setSt(s=>({...s, contestacoes:[...s.contestacoes, {id:'ct'+Date.now(), motorista:user.nome, cargaId:contestar.id, motivo:motivo.trim(), status:'pendente', resposta:'', data:HOJE}]}));
    setContestar(null); setMotivo(''); toast('Contestação enviada para a logística.');
  };
  const mesesDisp = MESES_2026.slice(0,7);
  return (
    <React.Fragment>
      <div className="seletor-mes">
        {mesesDisp.map(m=> <button key={m} className={'mes-pill'+(m===mes?' on':'')} onClick={()=>setMes(m)}>{mesLabel(m)}</button>)}
      </div>
      <div className="totais">
        <div className="card"><div className="v num">{ap.nCargas}</div><div className="l">Cargas</div></div>
        <div className="card"><div className="v num">{brn(ap.peso,1)}</div><div className="l">Peso (t)</div></div>
        <div className="card"><div className="v num">{brl(ap.fat)}</div><div className="l">Faturamento</div></div>
      </div>
      {!ap.temDados && <div className="card muted">Nenhuma carga registrada em {mesLabel(mes)}.</div>}
      {ap.temDados && !ap.detalhe &&
        <div className="aviso-box">O detalhe carga a carga de {mesLabel(mes)} ainda não foi importado para o app — os totais acima vêm do fechamento do mês. A partir de Mai/2026 a lista completa está disponível.</div>}
      {cargasMes.map(c=>{
        const ct = contestDaCarga(c.id);
        return (
          <div className="card carga" key={c.id}>
            <div className="row">
              <div className="grow">
                <div className="rota">{c.origem} <span className="seta">→</span> {c.destino}</div>
                <div className="meta-l">{dataBR(c.data)} · {c.produto} · NF {c.nota} · <span className="num">{brn(c.peso)} t</span> · <span className="num">R$ {brn(c.rt)}/t</span></div>
              </div>
              <div style={{textAlign:'right'}}>
                <div className="valor num">{brl(c.valor)}</div>
                {ct ? <StatusTag s={ct.status}/> :
                  <button className="btn btn-g btn-sm" style={{marginTop:4}} onClick={()=>setContestar(c)}>Contestar</button>}
              </div>
            </div>
            {ct && ct.resposta && <div className="muted" style={{marginTop:6}}>Resposta da logística: {ct.resposta}</div>}
          </div>
        );
      })}
      {contestar &&
        <Modal titulo="Contestar carga" onClose={()=>setContestar(null)}>
          <div className="card" style={{background:'var(--papel)', boxShadow:'none', marginBottom:12}}>
            <b>{contestar.origem} → {contestar.destino}</b>
            <div className="muted">{dataBR(contestar.data)} · NF {contestar.nota} · {brn(contestar.peso)} t · {brl(contestar.valor)}</div>
          </div>
          <label>O que está errado?</label>
          <textarea rows="4" value={motivo} onChange={e=>setMotivo(e.target.value)} placeholder="Ex.: o peso está diferente do ticket da balança..."/>
          <button className="btn btn-p" style={{width:'100%', marginTop:12}} onClick={enviar}>Enviar contestação</button>
        </Modal>}
    </React.Fragment>
  );
}

/* ================= MOTORISTA: PREMIAÇÃO ================= */
function Regua({fat, meta}){
  if(!meta) return null;
  const fim = meta.meta * 1.25;
  const pct = Math.max(0, Math.min(100, fat/fim*100));
  const pStart = meta.start/fim*100, pMeta = meta.meta/fim*100;
  return (
    <div className="regua">
      <div className={'fill'+(fat>=meta.meta?' alem':'')} style={{width:pct+'%'}}></div>
      <div className="marco" style={{left:pStart+'%'}}><span className="flag">START {brn(meta.start/1000,0)}k</span></div>
      <div className="marco meta" style={{left:pMeta+'%'}}><span className="flag">META {brn(meta.meta/1000,0)}k</span></div>
      <span className="caminhao" style={{left:pct+'%'}}>🚛</span>
    </div>
  );
}
function TelaPremiacao({st, user, dados}){
  const [mes,setMes]=useState(MES_ATUAL);
  const ap = apuracaoMes(st, dados, user.nome, mes);
  const quad = QUADS.find(q=>q.meses.includes(mes));
  const apsQuad = quad.meses.map(m=>({mes:m, ...apuracaoMes(st, dados, user.nome, m)}));
  const somaQuad = apsQuad.reduce((s,a)=>s+a.apurado,0);
  const pctStart = ap.meta ? Math.min(100, ap.fat/ap.meta.start*100) : 0;
  const pctMeta = ap.meta ? Math.min(100, ap.fat/ap.meta.meta*100) : 0;
  const faltaStart = ap.meta ? Math.max(0, ap.meta.start - ap.fat) : 0;
  return (
    <React.Fragment>
      <div className="seletor-mes">
        {MESES_2026.slice(0,7).map(m=> <button key={m} className={'mes-pill'+(m===mes?' on':'')} onClick={()=>setMes(m)}>{mesLabel(m)}</button>)}
      </div>

      <div className="card regua-wrap">
        <div className="row">
          <div className="grow">
            <div className="muted">Faturamento em {mesLabel(mes)}{ap.tipo ? ' · '+ap.tipo : ''}</div>
            <div className="grande num" style={{color:'var(--mata)'}}>{brl(ap.fat)}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div className="muted">Atingido</div>
            <div className="disp num" style={{fontWeight:800, fontSize:20, color: pctMeta>=100?'var(--colheita-escura)':'var(--mata)'}}>
              {pctMeta>=100 ? 'META ✓' : brn(pctStart,0)+'% do start'}
            </div>
          </div>
        </div>
        <Regua fat={ap.fat} meta={ap.meta}/>
        <div className="muted" style={{textAlign:'center'}}>
          {!ap.meta ? 'Sem meta cadastrada para o tipo de veículo.' :
           ap.fat>=ap.meta.meta ? 'Meta batida! Cada R$ 1.000 acima da meta soma R$ 70 (teto '+brl(ap.meta.teto)+').' :
           ap.fat>=ap.meta.start ? 'Start atingido — cada R$ 1.000 a mais soma R$ 50 até a meta.' :
           'Faltam '+brl(faltaStart)+' de frete para começar a pontuar.'}
        </div>
      </div>

      <div className="card">
        <h3 style={{marginBottom:6}}>Apuração de {mesLabel(mes)}</h3>
        <div className="linha-item">
          <span>Frete realizado no mês</span>
          <b className="num" style={{color:'var(--mata)'}}>{brl(ap.fat)}</b>
        </div>
        <div className="linha-item">
          <span>Meta mensal{ap.tipo ? <span className="muted"> — {ap.tipo}</span> : null}</span>
          <b className="num">{ap.meta ? brl(ap.meta.meta) : 'Não cadastrada'}</b>
        </div>
        <div className="linha-item">
          <span>Premiação pelo frete realizado <span className="muted">(estimativa)</span></span>
          <b className="num" style={{color:'var(--mata)'}}>{brl(ap.prod)}</b>
        </div>
        {[
          {rotulo:'Notificação / Advertência', aliases:['Notificação / Advertência','Notificação / Advertencia']},
          {rotulo:'Multas', aliases:['Multas']},
          {rotulo:'Auditoria Interna', aliases:['Auditoria Interna','Check List']}
        ].map(grupo=>{
          const doItem = ap.descs.filter(d=>grupo.aliases.includes(d.item));
          const tot = doItem.reduce((s,d)=>s+d.valor,0);
          return (
            <div className="linha-item" key={grupo.rotulo}>
              <span>{grupo.rotulo}
                <span className="muted"> — {doItem.length===0 ? 'nenhuma ocorrência' : doItem.length+' ocorrência'+(doItem.length>1?'s':'')}</span></span>
              <b className="num" style={{color: tot<0?'var(--erro)':'var(--cinza)'}}>{tot<0 ? brl(tot) : brl(0)}</b>
            </div>
          );
        })}
        <div className="linha-item" style={{fontSize:15.5}}><b>Apurado no mês</b>
          <b className="num" style={{color: ap.apurado<0?'var(--erro)':'var(--mata)'}}>{brl(ap.apurado)}</b></div>
        <div className="aviso-box" style={{marginTop:10}}>Valores estimados conforme POL 4.1.1 e sujeitos a conferência. O pagamento é a soma dos meses do quadrimestre, via folha.</div>
      </div>

      <div className="card">
        <div className="row" style={{marginBottom:10}}>
          <h3 className="grow">{quad.nome}</h3>
          <span className="tag tag-neutro">Pagamento {quad.pgto}</span>
        </div>
        {apsQuad.map(a=>{
          const futuro = a.mes > MES_ATUAL;
          return (
            <div className={'quad-mes'+(a.mes===mes?' on':'')} key={a.mes}>
              <span style={{fontWeight:600}}>{mesLabel(a.mes)}</span>
              {futuro ? <span className="muted">em andamento</span> :
                <b className="num" style={{color: a.apurado<0?'var(--erro)':'var(--mata)'}}>{brl(a.apurado)}</b>}
            </div>
          );
        })}
        <div className="linha-item" style={{fontSize:16, marginTop:6}}>
          <b>Acumulado do quadrimestre</b>
          <b className="num" style={{color:'var(--mata)'}}>{brl(Math.max(0,somaQuad))}</b>
        </div>
        {somaQuad<0 && <div className="muted">O acumulado ficou negativo ({brl(somaQuad)}); nesse caso não há desconto em folha — o pagamento fica em R$ 0,00.</div>}
      </div>
    </React.Fragment>
  );
}

/* ================= MOTORISTA: CHECK LIST ================= */
function TelaChecklist({st, setSt, user, toast}){
  /* ALTERAÇÃO V6: o envio agora passa por IndexedDB + ApiService (fila offline
     com idempotência por idLocal). O estado local (setSt) é mantido apenas
     para a demonstração do fluxo de aprovação do ADM. */
  const meus = st.checklists.filter(c=>c.motorista===user.nome).sort((a,b)=>b.data.localeCompare(a.data));
  const normalizarTexto = valor=>String(valor||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  const deHoje = meus.find(c=>c.data===HOJE && c.status!=='reprovado');
  const reprovadoHoje = meus.find(c=>c.data===HOJE && c.status==='reprovado');
  const [preenchendo,setPreenchendo]=useState(false);
  const [resps,setResps]=useState({});
  const [ver,setVer]=useState(null);
  const mesAtualFiltro = String(HOJE||'').slice(0,7);
  const [filtroMesHistorico,setFiltroMesHistorico]=useState(mesAtualFiltro);
  const [filtroStatusHistorico,setFiltroStatusHistorico]=useState('todos');
  const [extras,setExtras]=useState({km:'', combustivel:''});
  const [enviando,setEnviando]=useState(false);
  const [ultimoEnvio,setUltimoEnvio]=useState(null);   // confirmação real da API (protocolo)
  const [pendentes,setPendentes]=useState([]);          // fila local aguardando envio
  const [online,setOnline]=useState(navigator.onLine);
  const [temRascunho,setTemRascunho]=useState(false);
  const fileRefs = useRef({});
  const veiculosDemo = Object.values(st.frota).filter(f=>f.motorista===user.nome);
  const [veiculosPermitidos,setVeiculosPermitidos]=useState(CONFIG.MODO_DEMONSTRACAO?veiculosDemo:[]);
  const [carregandoVeiculos,setCarregandoVeiculos]=useState(!CONFIG.MODO_DEMONSTRACAO);
  const [erroVeiculos,setErroVeiculos]=useState('');
  const [veiculo,setVeiculo]=useState(veiculosDemo[0]?.placa||'');
  const vSel = veiculosPermitidos.find(v=>v.placa===veiculo);
  const frotaSel = normalizarTexto(vSel?.tipoFrota||vSel?.frota||'').includes('leve') ? 'leve' : 'pesada';

  const [perguntasAtivas,setPerguntasAtivas]=useState([]);
  const [carregandoPerguntas,setCarregandoPerguntas]=useState(false);
  const [erroPerguntas,setErroPerguntas]=useState('');

  useEffect(()=>{
    if(CONFIG.MODO_DEMONSTRACAO) return;
    let ativo=true;
    setCarregandoVeiculos(true); setErroVeiculos('');
    ApiService.obterVeiculos().then(r=>{
      if(!ativo) return;
      const lista=r.veiculos||[];
      setVeiculosPermitidos(lista);
      setVeiculo(atual=>lista.some(v=>v.placa===atual)?atual:(lista[0]?.placa||''));
    }).catch(e=>{if(ativo){setVeiculosPermitidos([]);setVeiculo('');setErroVeiculos(e.message||'Não foi possível carregar os veículos.');}})
      .finally(()=>{if(ativo)setCarregandoVeiculos(false);});
    return ()=>{ativo=false;};
  },[user.id,user.login]);

  const normalizarStatusChecklist = valor=>{
    const s = String(valor||'pendente').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
    if(s.includes('aprov')) return 'aprovado';
    if(s.includes('reprov')) return 'reprovado';
    return 'pendente';
  };

  const carregarHistorico = async ()=>{
    if(CONFIG.MODO_DEMONSTRACAO) return;
    try{
      const r = await ApiService.consultarMeusChecklists();
      const vindos = (r.checklists||[]).map(x=>({
        id:x.protocolo || x.id,
        idLocal:x.idLocal || '',
        motorista:x.motoristaNome || user.nome,
        placa:x.placa || '',
        frota:String(x.tipoChecklist||'').toUpperCase().includes('LEVE') ? 'leve' : 'pesada',
        data:String(x.dataHoraLocal||'').slice(0,10),
        status:normalizarStatusChecklist(x.status),
        motivoReprova:x.motivoReprova || '',
        km:String(x.quilometragem||''),
        respostas:(x.respostas||[]).map(rr=>({
          pid:String(rr.idPergunta||''),
          resp:rr.resposta||'NA',
          obs:rr.observacao||'',
          foto:rr.linkFoto||null
        }))
      }));
      setSt(s=>({...s, checklists:vindos}));
    }catch(e){
      toast('O checklist foi salvo, mas não foi possível atualizar o histórico: '+(e.message||e));
    }
  };

  useEffect(()=>{ carregarHistorico(); },[]);

  useEffect(()=>{
    let ativo = true;
    const carregar = async ()=>{
      setCarregandoPerguntas(true);
      setErroPerguntas('');
      setPerguntasAtivas([]);
      try{
        const tipo = frotaSel==='leve' ? 'LEVE' : 'PESADA';
        const r = await ApiService.obterPerguntas(tipo,{placa:veiculo});
        if(!ativo) return;
        const lista = (r.perguntas || []).map(p=>({
          id:String(p.id),
          texto:p.texto || '',
          grupo:p.grupo || 'Outros',
          frota:(p.tipoFrota || tipo).toLowerCase(),
          frequencia:p.frequencia || 'Diária',
          obrigatoria:p.obrigatoria === true,
          fotoNC:p.fotoObrigatoriaNC === true,
          observacaoObrigatoriaNC:p.observacaoObrigatoriaNC === true,
          ativa:p.ativa !== false,
          ordem:Number(p.ordem || 999)
        })).sort((a,b)=>a.grupo.localeCompare(b.grupo,'pt-BR') || a.ordem-b.ordem);
        setPerguntasAtivas(lista);
      }catch(e){
        if(ativo) setErroPerguntas(e.message || 'Não foi possível carregar as perguntas.');
      }finally{
        if(ativo) setCarregandoPerguntas(false);
      }
    };
    carregar();
    return ()=>{ ativo=false; };
  },[frotaSel,veiculo]);

  const grupos = [...new Set(perguntasAtivas.map(p=>p.grupo))];
  const chaveRascunho = 'ck_'+user.login+'_'+HOJE;

  // Histórico e indicadores respeitam o mês/status escolhidos pelo motorista.
  const historicoFiltrado = meus.filter(c=>(!filtroMesHistorico || String(c.data||'').slice(0,7)===filtroMesHistorico) && (filtroStatusHistorico==='todos' || c.status===filtroStatusHistorico));
  const cont = lista => ({tot:lista.length, ap:lista.filter(c=>c.status==='aprovado').length, rep:lista.filter(c=>c.status==='reprovado').length, pen:lista.filter(c=>c.status==='pendente').length});
  const cM = cont(historicoFiltrado);
  const mesFiltroLabel = filtroMesHistorico ? mesLabel(filtroMesHistorico.slice(5,7)+'/'+filtroMesHistorico.slice(0,4)) : 'todos os meses';

  /* ALTERAÇÃO V6: monitorar fila local e estado da conexão */
  const atualizarFila = ()=>{ FilaEnvio.pendentes(user.login).then(setPendentes).catch(()=>{}); };
  useEffect(()=>{
    atualizarFila();
    const ouv = ()=>atualizarFila();
    FilaEnvio.ouvintes.add(ouv);
    const on = ()=>{ setOnline(true); FilaEnvio.processar(toast, user.login); };
    const off = ()=>setOnline(false);
    window.addEventListener('online', on); window.addEventListener('offline', off);
    // Remove automaticamente apenas registros locais impossíveis de recuperar.
    // Checklists válidos aguardando internet continuam preservados.
    FilaEnvio.sanear(user.login).then(()=>atualizarFila()).catch(()=>{});
    IDB.lerRascunho(chaveRascunho).then(r=>setTemRascunho(!!r));
    return ()=>{ FilaEnvio.ouvintes.delete(ouv); window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  },[user.login]);

  /* ALTERAÇÃO V6: salvamento automático do rascunho + aviso ao sair da página */
  useEffect(()=>{
    if(!preenchendo) return;
    const t = setTimeout(()=>{ IDB.salvarRascunho(chaveRascunho, {resps, extras, veiculo}).catch(()=>{}); }, 800);
    return ()=>clearTimeout(t);
  },[resps, extras, veiculo, preenchendo]);
  useEffect(()=>{
    if(!preenchendo) return;
    const aviso = e=>{ e.preventDefault(); e.returnValue=''; };
    window.addEventListener('beforeunload', aviso);
    return ()=>window.removeEventListener('beforeunload', aviso);
  },[preenchendo]);

  const abrirFormulario = async ()=>{
    if(carregandoVeiculos){ toast('Aguarde: carregando o veículo vinculado.'); return; }
    if(erroVeiculos){ toast('Não foi possível abrir o checklist: '+erroVeiculos); return; }
    if(!veiculo){ toast('Nenhum veículo ativo está compartilhado ou vinculado ao seu usuário.'); return; }
    if(carregandoPerguntas){
      toast('Aguarde: carregando as perguntas do SharePoint.');
      return;
    }
    if(erroPerguntas){
      toast('Não foi possível abrir o checklist: '+erroPerguntas);
      return;
    }
    if(!perguntasAtivas.length){
      toast('Não há inspeções pendentes para este veículo neste período.');
      return;
    }
    const r = await IDB.lerRascunho(chaveRascunho).catch(()=>null);
    if (r && (Object.keys(r.resps||{}).length || r.extras && r.extras.km)){
      setResps(r.resps||{}); setExtras(r.extras||{km:'',combustivel:''});
      if (r.veiculo) setVeiculo(r.veiculo);
      toast('Rascunho recuperado — continue de onde parou.');
    }
    setPreenchendo(true); setUltimoEnvio(null);
  };
  const cancelar = ()=>{
    setPreenchendo(false); setResps({}); setExtras({km:'',combustivel:''});
    IDB.apagarRascunho(chaveRascunho).catch(()=>{}); setTemRascunho(false);
  };

  const setResp=(pid, campo, v)=> setResps(r=>({...r, [pid]:{...(r[pid]||{}), [campo]:v}}));

  /* ALTERAÇÃO V6: foto é comprimida (máx. 1600px, JPEG q=0,7) antes de anexar */
  const anexar=(pid, e)=>{
    const f = e.target.files && e.target.files[0]; if(!f) return;
    e.target.value = '';
    comprimirImagem(f)
      .then(b64=>setResp(pid,'foto',b64))
      .catch(err=>toast(err.message));
  };
  const removerFoto=(pid)=> setResp(pid,'foto',null);

  const obterLocalizacao = ()=> new Promise(res=>{
    if(!navigator.geolocation) return res({latitude:null, longitude:null});
    navigator.geolocation.getCurrentPosition(
      p=>res({latitude:p.coords.latitude, longitude:p.coords.longitude}),
      ()=>res({latitude:null, longitude:null}),
      {timeout:4000, maximumAge:600000});
  });

  /* ALTERAÇÃO V6: validações, payload padronizado, fila IndexedDB e envio à API */
  const enviar = async ()=>{
    if (enviando) return; // prevenção contra clique duplo
    if(!String(user?.nome||'').trim() || !String(user?.login||'').trim()){
      toast('Sua sessão está incompleta. Saia, entre novamente e refaça o checklist.'); return;
    }
    if(!String(veiculo||'').trim()){
      toast('Selecione um veículo antes de enviar.'); return;
    }
    // Quilometragem obrigatória e válida para qualquer frota
    const km = parseInt(extras.km, 10);
    if (!extras.km || isNaN(km) || km<=0){ toast('Informe a quilometragem atual do veículo (somente números).'); return; }
    if (km > 3000000){ toast('Quilometragem fora do limite razoável. Confira o valor.'); return; }
    const ultimoKm = parseInt(localStorage.getItem('km_'+veiculo)||'0',10);
    if (ultimoKm && km < ultimoKm && !window.confirm('Atenção: a quilometragem informada ('+km+') é MENOR que a última registrada para esta placa ('+ultimoKm+'). Deseja continuar mesmo assim?')) return;
    for(const p of perguntasAtivas){
      const r = resps[p.id];
      if(p.obrigatoria && (!r || !r.resp)){ toast('Responda: "'+p.texto.slice(0,40)+'..."'); return; }
      if(r && r.resp==='NC' && !r.obs){ toast('Descreva o problema do item não conforme: '+p.texto.slice(0,35)+'...'); return; }
      if(r && r.resp==='NC' && p.fotoNC && !r.foto){ toast('Anexe a foto da não conformidade: '+p.texto.slice(0,35)+'...'); return; }
    }
    if(!window.confirm('Confirma o envio do checklist da placa '+veiculo+'?')) return;

    setEnviando(true);
    try{
      const loc = await obterLocalizacao();
      const idLocal = gerarUUID(); // mesmo id em todas as tentativas -> sem duplicidade no SharePoint
      const registro = {
        idLocal,
        dataHoraLocal: agoraISO(),
        motorista: {nome:user.nome, login:user.login},
        veiculo: {placa:veiculo, tipo: vSel ? vSel.tipo : ''},
        quilometragem: km,
        combustivel: frotaSel==='leve' ? (extras.combustivel||'') : '',
        tipoChecklist: frotaSel==='leve' ? 'LEVE' : 'PESADA',
        versaoFormulario: CONFIG.VERSAO,
        localizacao: loc,
        respostas: perguntasAtivas.map(p=>{
          const r = resps[p.id]||{};
          return {idPergunta:p.id, grupo:p.grupo, pergunta:p.texto,
                  resposta:r.resp||'NA', observacao:r.obs||'', possuiFoto:!!r.foto,
                  fotos: r.foto ? [{nome:p.id+'-01.jpg', tipo:'image/jpeg', conteudoBase64:r.foto}] : []};
        }),
        quantidadeNC: perguntasAtivas.filter(p=>resps[p.id] && resps[p.id].resp==='NC').length,
        statusChecklist: 'PENDENTE'
      };

      // 1) grava na fila local ANTES de tentar enviar (não se perde sem internet)
      await FilaEnvio.adicionar(registro);
      localStorage.setItem('km_'+veiculo, String(km));

      // Somente no modo demonstração o registro entra diretamente no painel local.
      // Em produção, o painel administrativo deve carregar exclusivamente os dados da API/SharePoint.
      if (CONFIG.MODO_DEMONSTRACAO){
        const registroLocal = {id:'demo'+Date.now(), idLocal, motorista:user.nome, placa:veiculo, frota:frotaSel, data:HOJE, status:'pendente', motivoReprova:'',
          km: String(km), combustivel: extras.combustivel||'',
          respostas: perguntasAtivas.map(p=>({pid:p.id, resp:(resps[p.id]&&resps[p.id].resp)||'NA', obs:(resps[p.id]&&resps[p.id].obs)||'', foto:(resps[p.id]&&resps[p.id].foto)||null}))};
        setSt(s=>({...s, checklists:[...s.checklists, registroLocal]}));
      }

      // 2) tenta enviar agora; só marca ENVIADO com confirmação real da API
      await FilaEnvio.processar(toast, user.login);
      const fila = await IDB.listarFila();
      const meu = fila.find(x=>x.idLocal===idLocal);
      if (meu && meu.statusEnvio==='ENVIADO'){
        setUltimoEnvio({protocolo:meu.protocolo, placa:veiculo, quando:meu.dataHoraRecebimento||agoraISO()});
        await carregarHistorico();
      } else if (!navigator.onLine){
        toast('Sem conexão com a internet. O checklist foi salvo neste aparelho e será enviado quando a conexão retornar.');
      } else {
        toast('Não foi possível concluir o envio agora. Seus dados continuam salvos neste aparelho.');
      }
      await IDB.apagarRascunho(chaveRascunho); setTemRascunho(false);
      setPreenchendo(false); setResps({}); setExtras({km:'',combustivel:''});
      atualizarFila();
    } finally {
      setEnviando(false);
    }
  };

  const reenviarPendentes = ()=>{ toast('Tentando enviar novamente...'); FilaEnvio.processar(toast, user.login); };
  const excluirRegistroInvalido = async idLocal=>{
    if(!window.confirm('Excluir este envio incompleto deste aparelho? Depois será necessário refazer o checklist.')) return;
    await IDB.removerFila(idLocal); atualizarFila();
    toast('Registro incompleto removido. Refaça o checklist.');
  };
  const rotuloStatusEnvio = {RASCUNHO:'Rascunho', PENDENTE:'Aguardando envio', ENVIANDO:'Enviando...', ENVIADO:'Enviado', ERRO:'Falha no envio', DADOS_INCOMPLETOS:'Precisa ser refeito'};

  return (
    <React.Fragment>
      {/* ALTERAÇÃO V6: barra de conexão + fila pendente */}
      {!online &&
        <div className="erro-box">Sem conexão com a internet. Você pode preencher normalmente — o checklist ficará salvo neste aparelho e será enviado quando a conexão retornar.</div>}
      {pendentes.length>0 &&
        <div className="card" style={{borderLeft:'4px solid var(--colheita)'}}>
          <div className="row">
            <div className="grow"><b>{pendentes.length} checklist(s) aguardando envio</b>
              <div className="muted">{pendentes.map(p=>dataBR(String(p.dataHoraLocal||'').slice(0,10))+' · '+(p.veiculo?.placa||'placa não informada')+' · '+(rotuloStatusEnvio[p.statusEnvio]||p.statusEnvio)+(p.ultimoErro?' ('+p.ultimoErro+')':'')).join(' — ')}</div>
            </div>
            {pendentes.some(p=>p.statusEnvio==='DADOS_INCOMPLETOS')
              ? <button className="btn btn-d btn-sm" onClick={()=>excluirRegistroInvalido(pendentes.find(p=>p.statusEnvio==='DADOS_INCOMPLETOS').idLocal)}>Excluir e refazer</button>
              : <button className="btn btn-s btn-sm" onClick={reenviarPendentes}>Tentar enviar novamente</button>}
          </div>
        </div>}
      {ultimoEnvio &&
        <div className="card" style={{borderLeft:'4px solid var(--ok)'}}>
          <b>Checklist enviado com sucesso.</b>
          <div className="muted" style={{marginTop:4}}>
            Protocolo: <b className="num">{ultimoEnvio.protocolo}</b><br/>
            Placa: <b>{ultimoEnvio.placa}</b> · Data: {dataBR(ultimoEnvio.quando.slice(0,10))} às {ultimoEnvio.quando.slice(11,16)}
          </div>
        </div>}

      {!preenchendo && <React.Fragment>
        <div className="totais">
          <div className="card"><div className="v num">{cM.tot}</div><div className="l">Checklists em {mesFiltroLabel}</div></div>
          <div className="card"><div className="v num" style={{color:'var(--mata)'}}>{cM.ap}</div><div className="l">Aprovados</div></div>
          <div className="card"><div className="v num" style={{color:cM.rep?'var(--erro)':'var(--mata)'}}>{cM.rep}</div><div className="l">Reprovados</div></div>
        </div>
        {cM.pen>0 && <div className="muted" style={{textAlign:'center', marginTop:-4}}>{cM.pen} checklist(s) aguardando análise nos filtros selecionados.</div>}
      </React.Fragment>}

      {!preenchendo && carregandoPerguntas &&
        <div className="aviso-box">Carregando perguntas ativas do SharePoint...</div>}
      {!preenchendo && erroPerguntas &&
        <div className="erro-box">Falha ao carregar as perguntas: {erroPerguntas}</div>}
      {!preenchendo && !carregandoPerguntas && !erroPerguntas && perguntasAtivas.length===0 &&
        <div className="aviso-box">Não há inspeções pendentes para este veículo neste período.</div>}
      {!preenchendo && carregandoVeiculos && <div className="aviso-box">Carregando veículo vinculado...</div>}
      {!preenchendo && erroVeiculos && <div className="erro-box">Falha ao carregar veículos: {erroVeiculos}</div>}
      {!preenchendo && !carregandoVeiculos && !erroVeiculos && veiculosPermitidos.length===0 && <div className="aviso-box">Nenhum veículo ativo está compartilhado ou vinculado ao seu usuário.</div>}

      {!preenchendo && !deHoje &&
        <div className="card" style={{textAlign:'center', padding:'26px 16px'}}>
          <div style={{fontSize:34}}>📋</div>
          <h3 style={{margin:'6px 0 2px'}}>{reprovadoHoje ? 'Check list reprovado — refazer' : 'Check list de hoje pendente'}</h3>
          {reprovadoHoje && <div className="erro-box" style={{margin:'8px 0'}}>Motivo: {reprovadoHoje.motivoReprova}</div>}
          <div className="muted" style={{marginBottom:14}}>Inspeção pendente — {dataBR(HOJE)}</div>
          <button className="btn btn-p" disabled={carregandoVeiculos||!!erroVeiculos||!veiculo} onClick={abrirFormulario}>{reprovadoHoje?'Refazer check list':(temRascunho?'Continuar rascunho':'Preencher agora')}</button>
        </div>}
      {deHoje &&
        <div className="card row">
          <div className="grow"><b>Check list de hoje enviado</b><div className="muted">{dataBR(HOJE)} · {deHoje.placa}</div></div>
          <StatusTag s={deHoje.status}/>
        </div>}

      {preenchendo && <React.Fragment>
        <div className="card">
          <label>Veículo</label>
          <select value={veiculo} onChange={e=>{setVeiculo(e.target.value); setResps({});}}>
            {veiculosPermitidos.map(f=><option key={f.placa} value={f.placa}>{f.placa} — {f.tipoModelo||f.tipo} ({normalizarTexto(f.tipoFrota||f.frota).includes('leve')?'frota leve':'frota pesada'})</option>)}
          </select>
          <div className="form-grid" style={{marginTop:12}}>
            <div><label>KM atual *</label><input type="number" inputMode="numeric" value={extras.km} onChange={e=>setExtras({...extras, km:e.target.value})} placeholder="Ex.: 158420"/></div>
            {frotaSel==='leve' &&
              <div><label>Nível de combustível</label>
                <select value={extras.combustivel} onChange={e=>setExtras({...extras, combustivel:e.target.value})}>
                  <option value="">Selecionar...</option>
                  <option>Reserva</option><option>1/4</option><option>Meio tanque</option><option>3/4</option><option>Tanque cheio</option>
                </select></div>}
          </div>
        </div>
        <div className="aviso-box">Marque cada item. Em <b>não conforme (NC)</b>, descreva o problema e anexe foto quando o item pedir. Seu preenchimento é salvo automaticamente neste aparelho.</div>
        {grupos.map(g=>
          <React.Fragment key={g}>
            <h3 style={{margin:'6px 2px 0'}}>{g}</h3>
            {perguntasAtivas.filter(p=>p.grupo===g).map(p=>{
              const r = resps[p.id]||{};
              return (
                <div className="card perg" key={p.id}>
                  <div className="txt">{p.texto} {p.obrigatoria && <span style={{color:'var(--erro)'}}>*</span>}</div>
                  <div className="resp-btns">
                    <button className={'resp-btn c'+(r.resp==='C'?' on':'')} onClick={()=>setResp(p.id,'resp','C')}>Conforme</button>
                    <button className={'resp-btn nc'+(r.resp==='NC'?' on':'')} onClick={()=>setResp(p.id,'resp','NC')}>Não conforme</button>
                    <button className={'resp-btn na'+(r.resp==='NA'?' on':'')} onClick={()=>setResp(p.id,'resp','NA')}>N/A</button>
                  </div>
                  {r.resp==='NC' && <div style={{marginTop:10}}>
                    <textarea rows="2" placeholder="Descreva o problema..." value={r.obs||''} onChange={e=>setResp(p.id,'obs',e.target.value)}/>
                    <div className="row" style={{marginTop:8}}>
                      {r.foto && <React.Fragment>
                        <img className="foto-thumb" src={r.foto} alt="Foto da não conformidade"/>
                        <button className="btn btn-g btn-sm" onClick={()=>removerFoto(p.id)} aria-label="Remover foto">✕ Remover</button>
                      </React.Fragment>}
                      <button className="foto-add" onClick={()=>fileRefs.current[p.id] && fileRefs.current[p.id].click()} aria-label="Anexar foto">📷</button>
                      <input type="file" accept="image/*" capture="environment" style={{display:'none'}}
                        ref={el=>fileRefs.current[p.id]=el} onChange={e=>anexar(p.id,e)}/>
                      <span className="muted">{p.fotoNC ? 'Foto obrigatória' : 'Foto opcional'}</span>
                    </div>
                  </div>}
                </div>
              );
            })}
          </React.Fragment>)}
        {enviando && <div className="aviso-box"><b>Enviando checklist...</b> Não feche esta página.</div>}
        <div className="row">
          <button className="btn btn-g grow" disabled={enviando} onClick={cancelar}>Cancelar</button>
          <button className="btn btn-p grow" disabled={enviando} style={enviando?{opacity:.6}:{}} onClick={enviar}>{enviando?'Enviando...':'Enviar check list'}</button>
        </div>
      </React.Fragment>}

      {!preenchendo && meus.length>0 && <React.Fragment>
        <div className="row" style={{marginTop:4,flexWrap:'wrap'}}>
          <h3 className="grow" style={{margin:0}}>Histórico</h3>
          <input type="month" aria-label="Filtrar histórico por mês" style={{width:'auto'}} value={filtroMesHistorico} onChange={e=>setFiltroMesHistorico(e.target.value)}/>
          <select aria-label="Filtrar histórico por status" style={{width:'auto'}} value={filtroStatusHistorico} onChange={e=>setFiltroStatusHistorico(e.target.value)}>
            <option value="todos">Todos os status</option><option value="pendente">Aguardando análise</option><option value="aprovado">Aprovados</option><option value="reprovado">Reprovados</option>
          </select>
          <button className="btn btn-g btn-sm" onClick={()=>{setFiltroMesHistorico(mesAtualFiltro);setFiltroStatusHistorico('todos')}}>Limpar filtros</button>
        </div>
        {historicoFiltrado.length===0 && <div className="card muted">Nenhum checklist encontrado nos filtros selecionados.</div>}
        {historicoFiltrado.map(c=>
          <div className="card row" key={c.id}>
            <div className="grow"><b>{dataBR(c.data)}</b><div className="muted">{c.placa} · {c.respostas.filter(r=>r.resp==='NC').length} NC</div></div>
            <StatusTag s={c.status}/>
            <button className="btn btn-g btn-sm" onClick={()=>setVer(c)}>Ver</button>
          </div>)}
      </React.Fragment>}
      {ver && <ChecklistDetalhe ck={ver} perguntas={perguntasAtivas} onClose={()=>setVer(null)}/>}
    </React.Fragment>
  );
}
function ChecklistDetalhe({ck, perguntas, onClose, acoes}){
  const [fotoAberta,setFotoAberta]=useState(null);
  const escHtml=v=>String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const escAttr=escHtml;
  const imprimir=()=>{
    const statusTexto = ck.status==='aprovado'?'Aprovado':ck.status==='reprovado'?'Reprovado':'Aguardando análise';
    const linhas = ck.respostas.map(r=>{
      const p=perguntas.find(x=>x.id===r.pid); if(!p) return '';
      const resposta=r.resp==='C'?'Conforme':r.resp==='NC'?'Não conforme':'N/A';
      return `<section class="item"><div class="item-top"><strong>${escHtml(p.texto)}</strong><span class="resp ${r.resp}">${resposta}</span></div>${r.obs?`<div class="obs"><b>Observação:</b> ${escHtml(r.obs)}</div>`:''}${r.foto?`<img src="${escAttr(r.foto)}" alt="Foto da não conformidade">`:''}</section>`;
    }).join('');
    const w=window.open('','_blank','width=900,height=700');
    if(!w){ alert('O navegador bloqueou a janela de impressão. Permita pop-ups para este site.'); return; }
    w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Checklist ${escHtml(ck.placa||'')}</title><style>
      @page{size:A4;margin:14mm}*{box-sizing:border-box}body{font-family:Arial,sans-serif;color:#20231f;margin:0;font-size:11px}.cab{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #234b3b;padding-bottom:10px;margin-bottom:12px}.marca{color:#234b3b;font-size:18px;font-weight:700}.titulo{font-size:20px;margin:0 0 4px}.status{display:inline-block;border:1px solid #bbb;border-radius:5px;padding:4px 8px;font-weight:bold}.dados{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border:1px solid #d8dcd8;border-radius:7px;padding:10px;margin-bottom:12px}.dados div span{display:block;color:#68716b;font-size:9px;text-transform:uppercase;margin-bottom:2px}.item{border:1px solid #d8dcd8;border-radius:6px;padding:9px;margin-bottom:7px;break-inside:avoid;page-break-inside:avoid}.item-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.resp{white-space:nowrap;border-radius:10px;padding:3px 7px;font-size:9px;font-weight:bold}.resp.C{background:#dff1e7;color:#215a40}.resp.NC{background:#fde5dc;color:#9b3b20}.resp.NA{background:#eee;color:#555}.obs{margin-top:6px;color:#4d554f}.item img{display:block;max-width:100%;max-height:95mm;object-fit:contain;margin-top:8px;border:1px solid #ddd;border-radius:5px}.motivo{border:1px solid #e7a08c;background:#fff4ef;padding:9px;border-radius:6px;margin-bottom:12px}.assinaturas{display:grid;grid-template-columns:1fr 1fr;gap:35px;margin-top:24px;break-inside:avoid}.linha{border-top:1px solid #333;padding-top:5px;color:#555}.rodape{border-top:1px solid #ddd;margin-top:18px;padding-top:6px;color:#777;font-size:9px}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
    </style></head><body><header class="cab"><div><h1 class="titulo">Registro de Checklist</h1><div>Inspeção veicular</div></div><div class="marca">Bocchi Agrobios</div></header><div class="dados"><div><span>Motorista</span><b>${escHtml(ck.motorista||'—')}</b></div><div><span>Placa</span><b>${escHtml(ck.placa||'—')}</b></div><div><span>Data</span><b>${dataBR(ck.data)}</b></div><div><span>Tipo de frota</span><b>${ck.frota==='leve'?'Frota leve':'Frota pesada'}</b></div><div><span>Status</span><b>${statusTexto}</b></div><div><span>Protocolo</span><b>${escHtml(ck.id||'—')}</b></div>${ck.frota==='leve'?`<div><span>Quilometragem</span><b>${escHtml(ck.km||'—')}</b></div>`:''}</div>${ck.status==='reprovado'&&ck.motivoReprova?`<div class="motivo"><b>Motivo da reprovação:</b> ${escHtml(ck.motivoReprova)}</div>`:''}${linhas}<div class="assinaturas"><div class="linha">Motorista — nome/data</div><div class="linha">Responsável pela análise — nome/data</div></div><footer class="rodape">Documento gerado pelo Sistema de Gestão de Frota · ${new Date().toLocaleString('pt-BR')}</footer><script>window.onload=()=>setTimeout(()=>window.print(),350)<\/script></body></html>`);
    w.document.close();
  };
  return (
    <Modal titulo={'Check list — '+dataBR(ck.data)} onClose={onClose}>
      <div className="row" style={{justifyContent:'flex-end',marginBottom:10}}><button className="btn btn-s btn-sm" onClick={imprimir}>🖨 Imprimir</button></div>
      <div className="muted" style={{marginBottom:10}}>{primeiroNome(ck.motorista)} · {ck.placa} · {ck.frota==='leve'?'Frota leve':'Frota pesada'} · <StatusTag s={ck.status}/></div>
      {ck.frota==='leve' && (ck.km || ck.combustivel) &&
        <div className="muted" style={{marginBottom:10}}>KM: <b className="num">{ck.km||'—'}</b> · Combustível: <b>{ck.combustivel||'—'}</b></div>}
      {ck.status==='reprovado' && ck.motivoReprova && <div className="erro-box" style={{marginBottom:10}}>Motivo da reprovação: {ck.motivoReprova}</div>}
      {ck.respostas.map(r=>{
        const p = perguntas.find(x=>x.id===r.pid); if(!p) return null;
        return (
          <div key={r.pid} style={{padding:'8px 0', borderBottom:'1px solid var(--linha)'}}>
            <div className="row">
              <span className="grow" style={{fontSize:13.5}}>{p.texto}</span>
              <span className={'tag '+(r.resp==='C'?'tag-ok':r.resp==='NC'?'tag-neg':'tag-neutro')}>{r.resp==='C'?'Conforme':r.resp==='NC'?'NC':'N/A'}</span>
            </div>
            {r.obs && <div className="muted" style={{marginTop:4}}>{r.obs}</div>}
            {r.foto && <img className="foto-thumb foto-clicavel" style={{marginTop:6, width:110, height:110}} src={r.foto} alt="Foto anexada — clique para ampliar" title="Clique para ampliar" onClick={()=>setFotoAberta(r.foto)}/>} 
          </div>
        );
      })}
      {acoes && <div style={{marginTop:14}}>{acoes}</div>}
      {fotoAberta && <div className="visualizador-foto" onClick={e=>{if(e.target===e.currentTarget)setFotoAberta(null)}}>
        <img src={fotoAberta} alt="Foto ampliada do checklist"/>
        <div className="visualizador-foto-acoes">
          <a className="btn btn-p" href={fotoAberta} download={'checklist-'+(ck.placa||'foto')+'.jpg'} target="_blank" rel="noopener">⬇ Baixar foto</a>
          <a className="btn btn-s" href={fotoAberta} target="_blank" rel="noopener">Abrir original</a>
          <button className="btn btn-g" onClick={()=>setFotoAberta(null)}>Fechar</button>
        </div>
      </div>}
    </Modal>
  );
}

/* ================= SHELL MOTORISTA ================= */
function MotoristaApp({st, setSt, user, onSair, toast}){
  const dados = usarDadosMensais(st);
  const [carregandoCargas,setCarregandoCargas]=useState(!CONFIG.MODO_DEMONSTRACAO);
  useEffect(()=>{
    if(CONFIG.MODO_DEMONSTRACAO) return;
    let ativo=true;
    Promise.all([ApiService.obterCargas(),ApiService.obterPremiacao()]).then(([r,p])=>{
      if(!ativo) return;
      setSt(s=>({
        ...s,
        cargas:Array.isArray(r.cargas)?r.cargas:[],
        metas:Array.isArray(p.metas)?p.metas:s.metas,
        descontos:Array.isArray(p.descontos)?p.descontos:s.descontos
      }));
    }).catch(e=>toast('Não foi possível carregar as cargas: '+e.message)).finally(()=>{if(ativo)setCarregandoCargas(false)});
    return()=>{ativo=false};
  },[user.id]);
  const abas = [
    user.perms.cargas && {id:'cargas', ic:'🚛', nome:'Cargas'},
    user.perms.premiacao && {id:'prem', ic:'🏆', nome:'Premiação'},
    user.perms.checklist && {id:'check', ic:'📋', nome:'Check list'},
  ].filter(Boolean);
  const [aba,setAba]=useState(abas.length?abas[0].id:'');
  const placa = Object.values(st.frota).find(f=>f.motorista===user.nome && f.frota!=='leve');
  const recuperarAplicativo = async ()=>{
    const ok = window.confirm(
      'Usar a recuperação deste aparelho?\n\n'+
      'Rascunhos e registros incompletos serão apagados. Checklists válidos aguardando internet serão preservados.'
    );
    if(!ok) return;
    try{
      await FilaEnvio.sanear(user.login);
      await IDB.apagarRascunho('ck_'+String(user.login||'').toLowerCase()+'_'+HOJE).catch(()=>{});
      ApiService.sair();
      const url = new URL(window.location.href);
      url.searchParams.set('atualizar', CONFIG.VERSAO+'-'+Date.now());
      window.location.replace(url.toString());
    }catch(e){
      toast('Não foi possível recuperar automaticamente. Avise a logística.');
    }
  };
  return (
    <div className="mshell">
      <div className="mtop row">
        <div className="grow">
          <div className="nome">{primeiroNome(user.nome)}</div>
          <div className="sub">{placa ? placa.tipo : 'Motorista'}</div>
        </div>
        {placa && <span className="chip-placa">{placa.placa}</span>}
        <button className="btn btn-sm" style={{color:'rgba(255,255,255,.8)'}} onClick={onSair}>Sair</button>
      </div>
      <div className="mbody">
        {abas.length===0 && <div className="card muted">Seu usuário está sem módulos liberados. Fale com a logística.</div>}
        {aba==='cargas' && carregandoCargas && <div className="card muted">Carregando cargas do SharePoint...</div>}
        {aba==='cargas' && !carregandoCargas && <TelaCargas st={st} setSt={setSt} user={user} dados={dados} toast={toast}/>}
        {aba==='prem' && <TelaPremiacao st={st} user={user} dados={dados}/>}
        {aba==='check' && <TelaChecklist st={st} setSt={setSt} user={user} toast={toast}/>}
        <div className="card" style={{padding:12, marginTop:2}}>
          <div className="row">
            <div className="grow">
              <div style={{fontWeight:700, fontSize:13}}>Problema neste aparelho?</div>
              <div className="muted">Versão {CONFIG.VERSAO}</div>
            </div>
            <button className="btn btn-g btn-sm" onClick={recuperarAplicativo}>Limpar dados deste aparelho</button>
          </div>
        </div>
      </div>
      <nav className="mtabs">
        {abas.map(a=>
          <button key={a.id} className={'mtab'+(aba===a.id?' on':'')} onClick={()=>setAba(a.id)}>
            <span className="ic">{a.ic}</span>{a.nome}
          </button>)}
      </nav>
    </div>
  );
}

/* ================= ADM: PAINEL ================= */
function AdmPainel({st, dados}){
  const [mes,setMes]=useState(MES_ATUAL);
  const motoristas = st.usuarios.filter(u=>u.perfil==='motorista');
  const linhas = motoristas.map(u=>({u, ...apuracaoMes(st, dados, u.nome, mes)}))
    .sort((a,b)=>b.fat-a.fat);
  const totFat = linhas.reduce((s,l)=>s+l.fat,0);
  const pendCt = st.contestacoes.filter(c=>c.status==='pendente').length;
  const pendCk = st.checklists.filter(c=>c.status==='pendente').length;
  return (
    <React.Fragment>
      <div className="row" style={{flexWrap:'wrap'}}>
        <h2 className="grow">Painel — {mesLabel(mes)}</h2>
        <select style={{width:'auto'}} value={mes} onChange={e=>setMes(e.target.value)}>
          {MESES_2026.slice(0,7).map(m=><option key={m} value={m}>{mesLabel(m)}</option>)}
        </select>
      </div>
      <div className="cards4">
        <div className="card kpi"><div className="l">Faturamento frota</div><div className="v num">{brl(totFat)}</div></div>
        <div className="card kpi"><div className="l">Cargas no mês</div><div className="v num">{linhas.reduce((s,l)=>s+l.nCargas,0)}</div></div>
        <div className="card kpi"><div className="l">Contestações pendentes</div><div className="v num" style={{color:pendCt?'var(--erro)':'var(--mata)'}}>{pendCt}</div></div>
        <div className="card kpi"><div className="l">Check lists p/ aprovar</div><div className="v num" style={{color:pendCk?'var(--colheita-escura)':'var(--mata)'}}>{pendCk}</div></div>
      </div>
      <div className="card" style={{overflowX:'auto'}}>
        <table>
          <thead><tr><th>Motorista</th><th>Tipo</th><th className="td-num">Cargas</th><th className="td-num">Peso (t)</th><th className="td-num">Faturamento</th><th className="td-num">% Start</th><th className="td-num">Produtiv. est.</th><th className="td-num">Descontos</th><th className="td-num">Apurado</th></tr></thead>
          <tbody>
            {linhas.map(l=>
              <tr key={l.u.id}>
                <td><b>{primeiroNome(l.u.nome)}</b></td>
                <td className="muted">{l.tipo||'—'}</td>
                <td className="td-num num">{l.nCargas}</td>
                <td className="td-num num">{brn(l.peso,1)}</td>
                <td className="td-num num">{brl(l.fat)}</td>
                <td className="td-num num">{l.meta ? brn(Math.min(999,l.fat/l.meta.start*100),0)+'%' : '—'}</td>
                <td className="td-num num">{brl(l.prod)}</td>
                <td className="td-num num" style={{color:l.totDesc<0?'var(--erro)':'inherit'}}>{l.totDesc? brl(l.totDesc):'—'}</td>
                <td className="td-num num"><b style={{color:l.apurado<0?'var(--erro)':'var(--mata)'}}>{brl(l.apurado)}</b></td>
              </tr>)}
          </tbody>
        </table>
      </div>
    </React.Fragment>
  );
}

/* ================= ADM: IMPORTAÇÃO ================= */
function AdmImportar({st, setSt, toast}){
  const [resumo,setResumo]=useState(null);
  const [competenciasSelecionadas,setCompetenciasSelecionadas]=useState([]);
  const [placaSelecionada,setPlacaSelecionada]=useState('');
  const [dataInicial,setDataInicial]=useState('');
  const [dataFinal,setDataFinal]=useState('');
  const [erro,setErro]=useState('');
  const [lendo,setLendo]=useState(false);
  const [enviando,setEnviando]=useState(false);
  const [progresso,setProgresso]=useState(null);
  const fileRef = useRef(null);

  const processar = (file)=>{
    setErro(''); setResumo(null); setLendo(true);
    const rd = new FileReader();
    rd.onload = ev => {
      try{
        const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
        const nomeAba = wb.SheetNames.find(n=>n.toUpperCase().includes('BASE CARGAS FROTA')) ||
                        wb.SheetNames.find(n=>n.toUpperCase().trim()==='CARGAS FROTA');
        if(!nomeAba) throw new Error('Nenhuma aba de cargas encontrada. O arquivo precisa ter a aba "BASE CARGAS FROTA manual" (planilha da premiação) ou "CARGAS FROTA" (relatório).');
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[nomeAba], {defval:null});
        if(!rows.length) throw new Error('A aba "'+nomeAba+'" está vazia.');
        const cols = Object.keys(rows[0]);
        const obrig = ['DATA','PLACA','ORIGEM','DESTINO','PRODUTO','PESO (t)','PREMIAÇÃO'];
        const faltando = obrig.filter(c=>!cols.includes(c));
        if(faltando.length) throw new Error('Colunas não encontradas na aba "'+nomeAba+'": '+faltando.join(', ')+'. Confira se a planilha não foi alterada.');
        const colNota = cols.includes('N° NOTA') ? 'N° NOTA' : (cols.includes('Nº NOTA') ? 'Nº NOTA' : null);

        const novas=[];
        rows.forEach(r=>{
          if(!r['DATA'] || !r['PLACA']) return;
          let dt;
          if(r['DATA'] instanceof Date){
            const d = r['DATA'];
            // usa a data "de calendário" do Excel, imune a fuso horário
            const ut = new Date(d.getTime() + d.getTimezoneOffset()*60000 + 12*3600000);
            dt = ut.getFullYear()+'-'+String(ut.getMonth()+1).padStart(2,'0')+'-'+String(ut.getDate()).padStart(2,'0');
          } else { dt = String(r['DATA']).slice(0,10); }
          novas.push({data:dt, placa:String(r['PLACA']||'').trim().toUpperCase(), origem:r['ORIGEM']||'', destino:r['DESTINO']||'',
            produto:r['PRODUTO']||'', numeroNota:colNota?String(r[colNota]||''):'', valorTon:Number(r['R$/t'])||0,
            pesoTon:Number(r['PESO (t)'])||0, pesoBruto:Number(r['PESO BRUTO'])||0, freteTotal:Number(r['R$ TOTAL'])||0,
            premiacao:Number(r['PREMIAÇÃO'])||0, maiorKM:String(r['MAIOR KM?']||''), distancia:Number(r['DISTANCIA'])||0,
            freteOriginal:Number(r['FRETE ORIGINAL'])||0, diferenca:Number(r['DIFERENÇA'])||0});
        });

        // Descontos da aba "Lançamento", se existir
        const descNovos=[];
        if(wb.SheetNames.includes('Lançamento')){
          const lrows = XLSX.utils.sheet_to_json(wb.Sheets['Lançamento'], {range:6, defval:null});
          const jaTem = new Set(st.descontos.map(d=>[d.motorista,d.mes,d.item,d.valor].join('|')));
          lrows.forEach(r=>{
            const item = r['ITEM CONTROLE'];
            if(!['Multas','Notificação / Advertencia','Check List'].includes(item)) return;
            const v = Number(r['R$']); if(!v) return;
            const d = {motorista:r['MOTORISTA'], mes:String(r['MÊS/ANO']), item, valor:v};
            if(!jaTem.has([d.motorista,d.mes,d.item,d.valor].join('|'))) descNovos.push(d);
          });
        }
        const porCompetencia={};
        novas.forEach(c=>{const comp=c.data.slice(0,7);(porCompetencia[comp]||(porCompetencia[comp]=[])).push(c)});
        const competencias=Object.keys(porCompetencia).sort();
        const atual=new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0');
