        setCompetenciasSelecionadas([competencias.includes(atual)?atual:competencias[competencias.length-1]].filter(Boolean));
        setPlacaSelecionada(''); setDataInicial(''); setDataFinal('');
        setResumo({arquivo:file.name, aba:nomeAba, total:rows.length, novas, porCompetencia, descNovos});
      }catch(e){ setErro(e.message); }
      setLendo(false);
    };
    rd.readAsArrayBuffer(file);
  };
  const competenciasDisponiveis=resumo?Object.keys(resumo.porCompetencia).sort():[];
  const placasDisponiveis=resumo?[...new Set(resumo.novas.map(c=>c.placa))].sort():[];
  const cargasFiltradas=resumo?resumo.novas.filter(c=>
    competenciasSelecionadas.includes(c.data.slice(0,7)) &&
    (!placaSelecionada || c.placa===placaSelecionada) &&
    (!dataInicial || c.data>=dataInicial) && (!dataFinal || c.data<=dataFinal)
  ):[];
  const porCompetenciaFiltrada={};
  cargasFiltradas.forEach(c=>{const comp=c.data.slice(0,7);(porCompetenciaFiltrada[comp]||(porCompetenciaFiltrada[comp]=[])).push(c)});
  const alternarCompetencia=comp=>setCompetenciasSelecionadas(atual=>atual.includes(comp)?atual.filter(x=>x!==comp):[...atual,comp].sort());
  const confirmar=async()=>{
    const TAMANHO_LOTE=20;
    const MAX_TENTATIVAS_LOTE=6;
    if(!cargasFiltradas.length){setErro('Selecione ao menos uma competência com cargas para importar.');return;}
    setEnviando(true); setErro(''); setProgresso({processadas:0,total:cargasFiltradas.length,lote:0,totalLotes:Math.ceil(cargasFiltradas.length/TAMANHO_LOTE)});
    try{
      let novas=0, atualizadas=0, semAlteracao=0, duplicadasRemovidas=0;
      const lotes=[];
      Object.entries(porCompetenciaFiltrada).forEach(([competencia,cargas])=>{
        for(let inicio=0;inicio<cargas.length;inicio+=TAMANHO_LOTE) lotes.push({competencia,cargas:cargas.slice(inicio,inicio+TAMANHO_LOTE)});
      });
      let processadas=0;
      for(let indice=0;indice<lotes.length;indice++){
        const {competencia,cargas}=lotes[indice];
        let r=null;
        for(let tentativa=1;tentativa<=MAX_TENTATIVAS_LOTE;tentativa++){
          try{ r=await ApiService.importarCargas(competencia,cargas); break; }
          catch(e){
            const status=Number(e.status||0);
            const falhaTemporaria=!status || [408,425,429,500,502,503,504].includes(status) || e.name==='AbortError' || /failed to fetch|network|timeout|aborted/i.test(String(e.message||''));
            if(tentativa===MAX_TENTATIVAS_LOTE || !falhaTemporaria){
              e.message='Falha no lote '+(indice+1)+' de '+lotes.length+' ('+competencia+'): '+e.message;
              throw e;
            }
            const espera=Math.min(60000,5000*Math.pow(2,tentativa-1));
            setErro('Instabilidade no lote '+(indice+1)+'. Nova tentativa automática '+(tentativa+1)+' de '+MAX_TENTATIVAS_LOTE+' em '+Math.ceil(espera/1000)+'s...');
            await new Promise(resolve=>setTimeout(resolve,espera));
          }
        }
        novas+=Number(r.novas??r.gravadas??0);
        atualizadas+=Number(r.atualizadas||0);
        semAlteracao+=Number(r.semAlteracao||0);
        duplicadasRemovidas+=Number(r.duplicadasRemovidas||0);
        processadas+=cargas.length;
        setProgresso({processadas,total:cargasFiltradas.length,lote:indice+1,totalLotes:lotes.length});
        await new Promise(resolve=>setTimeout(resolve,1200));
      }
      const cargasAtualizadas=await ApiService.obterCargas();
      setSt(s=>({...s,cargas:Array.isArray(cargasAtualizadas.cargas)?cargasAtualizadas.cargas:s.cargas}));
      toast(novas+' novas, '+atualizadas+' atualizadas, '+semAlteracao+' já estavam iguais'+(duplicadasRemovidas?' e '+duplicadasRemovidas+' duplicadas removidas.':'.'));
      setResumo(null); setProgresso(null);
    }catch(e){
      const inc=e.detalhe&&e.detalhe.inconsistencias;
      setErro(e.message+(Array.isArray(inc)&&inc.length?' Primeiros casos: '+inc.slice(0,5).map(x=>x.placa+' em '+dataBR(x.data)+' — '+x.motivo).join('; '):''));
    }finally{setEnviando(false)}
  };
  return (
    <React.Fragment>
      <h2>Importar planilha</h2>
      <div className="card">
        <p style={{marginBottom:12}}>Envie a <b>planilha da premiação (.xlsm)</b> salva no SharePoint — o app lê a aba de cargas e também a aba "Lançamento" (multas, advertências e check list). O relatório de cargas (.xlsx) também é aceito.</p>
        <div className="drop">
          <div style={{fontSize:30, marginBottom:6}}>📥</div>
          {lendo ? 'Lendo o arquivo...' : 'Selecione o arquivo .xlsm ou .xlsx'}
          <div style={{marginTop:12}}>
            <button className="btn btn-p" onClick={()=>fileRef.current.click()}>Escolher arquivo</button>
            <input type="file" accept=".xlsx,.xlsm" style={{display:'none'}} ref={fileRef}
              onChange={e=>{ if(e.target.files[0]) processar(e.target.files[0]); e.target.value=''; }}/>
          </div>
        </div>
        {erro && <div className="erro-box" style={{marginTop:12}}>{erro}</div>}
      </div>
      {resumo &&
        <div className="card">
          <h3>Conferência antes de importar</h3>
          <div className="muted" style={{marginBottom:8}}>{resumo.arquivo} · aba "{resumo.aba}" · motorista e tipo serão resolvidos pela placa e vigência</div>
          <div className="linha-item"><span>Linhas lidas</span><b className="num">{resumo.total}</b></div>
          <div style={{marginTop:14}}><b>Competências a importar</b></div>
          <div className="row" style={{gap:8,marginTop:8,flexWrap:'wrap'}}>
            {competenciasDisponiveis.map(comp=><label key={comp} className="btn btn-s btn-sm" style={{cursor:'pointer',background:competenciasSelecionadas.includes(comp)?'var(--mata)':'white',color:competenciasSelecionadas.includes(comp)?'white':'inherit'}}><input type="checkbox" checked={competenciasSelecionadas.includes(comp)} onChange={()=>alternarCompetencia(comp)} style={{display:'none'}}/>{comp}</label>)}
          </div>
          <div className="row" style={{gap:10,marginTop:12,alignItems:'end',flexWrap:'wrap'}}>
            <label style={{minWidth:170,flex:1}}>Placa (opcional)<select value={placaSelecionada} onChange={e=>setPlacaSelecionada(e.target.value)} disabled={enviando}><option value="">Todas as placas</option>{placasDisponiveis.map(p=><option key={p} value={p}>{p}</option>)}</select></label>
            <label style={{minWidth:145}}>Data inicial<input type="date" value={dataInicial} onChange={e=>setDataInicial(e.target.value)} disabled={enviando}/></label>
            <label style={{minWidth:145}}>Data final<input type="date" value={dataFinal} onChange={e=>setDataFinal(e.target.value)} disabled={enviando}/></label>
          </div>
          <div className="linha-item" style={{marginTop:12}}><span>Cargas que serão comparadas</span><b className="num" style={{color:'var(--mata)'}}>{cargasFiltradas.length}</b></div>
          <div className="linha-item"><span>Competências selecionadas</span><b className="num">{competenciasSelecionadas.join(', ')||'Nenhuma'}</b></div>
          {enviando && progresso && <div className="aviso-box" style={{marginTop:12}}><b>Importando: {progresso.processadas} de {progresso.total} cargas</b><div className="muted">Lote {progresso.lote} de {progresso.totalLotes}. Não feche esta tela.</div><div style={{height:8,background:'#dfe7e2',borderRadius:8,marginTop:8,overflow:'hidden'}}><div style={{height:'100%',width:Math.round((progresso.processadas/Math.max(1,progresso.total))*100)+'%',background:'var(--mata)',transition:'width .2s'}}/></div></div>}
          <div className="row" style={{marginTop:12}}>
            <button className="btn btn-g" onClick={()=>setResumo(null)} disabled={enviando}>Cancelar</button>
            <button className="btn btn-p grow" onClick={confirmar} disabled={enviando||!cargasFiltradas.length}>{enviando?'Importando em lotes...':'Confirmar importação'}</button>
          </div>
        </div>}
      <div className="aviso-box">A planilha completa é lida apenas no navegador. Somente as competências, placa e período selecionados são enviados à API. Cargas iguais são mantidas, alteradas são atualizadas e novas são incluídas.</div>
    </React.Fragment>
  );
}

/* ================= ADM: CONTESTAÇÕES ================= */
function AdmContestacoes({st, setSt, toast}){
  const [filtro,setFiltro]=useState('pendente');
  const [respondendo,setRespondendo]=useState(null);
  const [resposta,setResposta]=useState('');
  const [decisao,setDecisao]=useState('procede');
  const lista = st.contestacoes.filter(c=>filtro==='todas'||c.status===filtro).sort((a,b)=>b.data.localeCompare(a.data));
  const cargaDe = id => st.cargas.find(c=>c.id===id);
  const responder=()=>{
    setSt(s=>({...s, contestacoes: s.contestacoes.map(c=>c.id===respondendo.id?{...c, status:decisao, resposta:resposta.trim()}:c)}));
    setRespondendo(null); setResposta(''); toast('Contestação respondida.');
  };
  return (
    <React.Fragment>
      <div className="row" style={{flexWrap:'wrap'}}>
        <h2 className="grow">Contestações de carga</h2>
        <div className="subtabs">
          {[['pendente','Pendentes'],['procede','Procedem'],['nao_procede','Não procedem'],['todas','Todas']].map(([v,l])=>
            <button key={v} className={'subtab'+(filtro===v?' on':'')} onClick={()=>setFiltro(v)}>{l}</button>)}
        </div>
      </div>
      {lista.length===0 && <div className="card muted">Nenhuma contestação {filtro==='todas'?'registrada':'nesta situação'}.</div>}
      {lista.map(ct=>{
        const c = cargaDe(ct.cargaId);
        return (
          <div className="card" key={ct.id}>
            <div className="row">
              <div className="grow">
                <b>{primeiroNome(ct.motorista)}</b> <span className="muted">· {dataBR(ct.data)}</span>
                {c && <div className="muted">{dataBR(c.data)} · {c.origem} → {c.destino} · NF {c.nota} · {brn(c.peso)} t · {brl(c.valor)}</div>}
              </div>
              <StatusTag s={ct.status}/>
            </div>
            <div style={{marginTop:8, background:'var(--papel)', borderRadius:10, padding:'9px 12px', fontSize:14}}>“{ct.motivo}”</div>
            {ct.resposta && <div className="muted" style={{marginTop:6}}>Resposta: {ct.resposta}</div>}
            {ct.status==='pendente' &&
              <button className="btn btn-s btn-sm" style={{marginTop:10}} onClick={()=>{setRespondendo(ct); setDecisao('procede'); setResposta('');}}>Responder</button>}
          </div>
        );
      })}
      {respondendo &&
        <Modal titulo="Responder contestação" onClose={()=>setRespondendo(null)}>
          <label>Decisão</label>
          <div className="subtabs" style={{marginBottom:12}}>
            <button className={'subtab'+(decisao==='procede'?' on':'')} onClick={()=>setDecisao('procede')}>Procede — corrigir carga</button>
            <button className={'subtab'+(decisao==='nao_procede'?' on':'')} onClick={()=>setDecisao('nao_procede')}>Não procede</button>
          </div>
          <label>Resposta ao motorista</label>
          <textarea rows="3" value={resposta} onChange={e=>setResposta(e.target.value)} placeholder={decisao==='procede'?'Ex.: confirmado com o ticket, peso será corrigido na próxima importação.':'Ex.: conferimos com a balança e o valor está correto.'}/>
          <div className="aviso-box" style={{margin:'10px 0'}}>A correção do dado em si é feita no sistema de origem — na próxima importação a carga entra atualizada.</div>
          <button className="btn btn-p" style={{width:'100%'}} onClick={responder}>Enviar resposta</button>
        </Modal>}
    </React.Fragment>
  );
}

/* ================= ADM: CHECK LIST (aprovação + perguntas + relatório) ================= */
function AdmChecklist({st, setSt, toast}){
  /* ALTERAÇÃO V6: fora do modo demonstração, o painel carrega os registros pela
     API (GET /admin/checklists) em vez de usar apenas o estado do navegador. */
  const [sub,setSub]=useState('aprovar');
  const [sincronizando,setSincronizando]=useState(false);
  const sincronizar = async ()=>{
    if (CONFIG.MODO_DEMONSTRACAO){ toast('Modo demonstração: dados locais. Configure a URL da Azure Function e desative MODO_DEMONSTRACAO para consultar o SharePoint.'); return; }
    setSincronizando(true);
    try{
      const r = await ApiService.admListarChecklists();
      const vindos = (r.itens||r.checklists||[]).map(x=>({
        id:x.protocolo, idLocal:x.idLocal, motorista:x.motoristaNome, placa:x.placa,
        frota:(x.tipoChecklist==='LEVE'?'leve':'pesada'), data:(x.dataHoraLocal||'').slice(0,10),
        status:(x.status||'PENDENTE').toLowerCase()==='aprovado'?'aprovado':((x.status||'').toLowerCase()==='reprovado'?'reprovado':'pendente'),
        motivoReprova:x.motivoReprovacao||'', km:x.quilometragem, combustivel:'',
        respostas:(x.respostas||[]).map(rr=>({pid:rr.idPergunta, resp:rr.resposta, obs:rr.observacao||'', foto:rr.linkFoto||null}))
      }));
      setSt(s=>({...s, checklists: vindos.length? vindos : s.checklists}));
      toast('Sincronizado: '+vindos.length+' checklist(s) carregado(s) do servidor.');
    }catch(e){ toast('Falha ao sincronizar: '+e.message); }
    finally{ setSincronizando(false); }
  };
  const [ver,setVer]=useState(null);
  const [reprovando,setReprovando]=useState(null);
  const [motivoRep,setMotivoRep]=useState('');
  const perguntaVazia={texto:'', grupo:'Anomalias estéticas', frota:'pesada', frequencia:'Diária', ordem:10, obrigatoria:true, fotoNC:false, ativa:true};
  const [novaPerg,setNovaPerg]=useState(perguntaVazia);
  const [editandoPergunta,setEditandoPergunta]=useState(null);
  const [fFrota,setFFrota]=useState('pesada');
  const [fMot,setFMot]=useState('todos');
  const mesAtualFiltro = String(HOJE||'').slice(0,7);
  const [fMes,setFMes]=useState(mesAtualFiltro);
  const [fPlaca,setFPlaca]=useState('todas');
  const [fStatus,setFStatus]=useState('todos');
  const [carregandoCatalogo,setCarregandoCatalogo]=useState(false);

  const carregarCatalogo = async ()=>{
    setCarregandoCatalogo(true);
    try{
      const r = await ApiService.obterPerguntas('TODAS',{incluirInativas:true});
      const lista = (r.perguntas || []).map(p=>({
        id:String(p.id),
        texto:p.texto || '',
        grupo:p.grupo || 'Outros',
        frota:(p.tipoFrota || '').toLowerCase(),
        frequencia:p.frequencia || 'Diária',
        obrigatoria:p.obrigatoria === true,
        fotoNC:p.fotoObrigatoriaNC === true,
        observacaoObrigatoriaNC:p.observacaoObrigatoriaNC === true,
        ativa:p.ativa !== false,
        ordem:Number(p.ordem || 999)
      })).sort((a,b)=>a.grupo.localeCompare(b.grupo,'pt-BR') || a.ordem-b.ordem);
      setSt(s=>({...s, perguntas:lista}));
    }catch(e){
      toast('Erro ao carregar perguntas do SharePoint: '+e.message);
    }finally{
      setCarregandoCatalogo(false);
    }
  };

  useEffect(()=>{ carregarCatalogo(); sincronizar(); },[]);

  const pendentes = st.checklists.filter(c=>c.status==='pendente');
  const decidir=async(ck, status, motivo)=>{
    /* ALTERAÇÃO V6: em produção a decisão também é gravada no SharePoint via API */
    if (!CONFIG.MODO_DEMONSTRACAO && ck.id && !String(ck.id).startsWith('DEMO-')){
      try{
        await ApiService.admStatus(ck.id, status==='aprovado'?'APROVADO':'REPROVADO', motivo||'');
      }catch(e){
        toast('Não foi possível gravar a decisão no SharePoint: '+e.message);
        return;
      }
    }
    setSt(s=>({...s, checklists:s.checklists.map(x=>x.id===ck.id?{...x, status, motivoReprova:motivo||''}:x)}));
    setVer(null); setReprovando(null); setMotivoRep('');
    toast(status==='aprovado'?'Check list aprovado.':'Check list reprovado — o motorista deverá refazer.');
  };
  const salvarPergunta = async()=>{
  if(!novaPerg.texto.trim()){
    toast('Escreva o texto da pergunta.');
    return;
  }
  const ordem=Number(novaPerg.ordem);
  if(!Number.isFinite(ordem)||ordem<0){toast('Informe uma ordem numérica igual ou maior que zero.');return;}

  try{
    const dados={
      texto: novaPerg.texto.trim(),
      grupo: novaPerg.grupo,
      tipoFrota: novaPerg.frota.toUpperCase(),
      frequencia: novaPerg.frequencia,
      ordem,
      obrigatoria: novaPerg.obrigatoria,
      fotoObrigatoriaNC: novaPerg.fotoNC,
      observacaoObrigatoriaNC: true,
      ativa: novaPerg.ativa!==false
    };
    if(editandoPergunta) await ApiService.atualizarPergunta(editandoPergunta.id,dados);
    else await ApiService.criarPergunta(dados);

    await carregarCatalogo();
    setNovaPerg({...perguntaVazia,grupo:novaPerg.grupo,frota:novaPerg.frota,frequencia:novaPerg.frequencia,ordem:ordem+10});
    setEditandoPergunta(null);
    toast(editandoPergunta?'Pergunta atualizada no SharePoint.':'Pergunta salva no SharePoint.');
  }catch(e){
    toast('Erro ao salvar pergunta: '+e.message);
  }
};
  const iniciarEdicao=p=>{setEditandoPergunta(p);setNovaPerg({texto:p.texto,grupo:p.grupo,frota:p.frota,frequencia:p.frequencia,ordem:p.ordem,obrigatoria:p.obrigatoria,fotoNC:p.fotoNC,ativa:p.ativa});window.scrollTo({top:0,behavior:'smooth'});};
  const alternarPergunta=async p=>{try{await ApiService.atualizarPergunta(p.id,{texto:p.texto,grupo:p.grupo,tipoFrota:p.frota.toUpperCase(),frequencia:p.frequencia,ordem:p.ordem,obrigatoria:p.obrigatoria,fotoObrigatoriaNC:p.fotoNC,observacaoObrigatoriaNC:p.observacaoObrigatoriaNC,ativa:!p.ativa});await carregarCatalogo();toast(p.ativa?'Pergunta inativada.':'Pergunta reativada.');}catch(e){toast('Erro ao alterar pergunta: '+e.message);}};
  const motoristas = [...new Set(st.checklists.map(c=>c.motorista).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt-BR'));
  const placas = [...new Set(st.checklists.map(c=>c.placa).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt-BR'));
  const relatorio = st.checklists.filter(c=>(!fMes||String(c.data||'').slice(0,7)===fMes) && (fPlaca==='todas'||c.placa===fPlaca) && (fMot==='todos'||c.motorista===fMot) && (fStatus==='todos'||c.status===fStatus)).sort((a,b)=>b.data.localeCompare(a.data));
  const totaisRelatorio={total:relatorio.length,aprovados:relatorio.filter(c=>c.status==='aprovado').length,reprovados:relatorio.filter(c=>c.status==='reprovado').length,pendentes:relatorio.filter(c=>c.status==='pendente').length};
  return (
    <React.Fragment>
      <div className="row" style={{flexWrap:'wrap'}}>
        <h2 className="grow">Check list veicular</h2>
        <button className="btn btn-s btn-sm" disabled={sincronizando} onClick={sincronizar}>{sincronizando?'Sincronizando...':'Sincronizar com servidor'}</button>
        <div className="subtabs">
          <button className={'subtab'+(sub==='aprovar'?' on':'')} onClick={()=>setSub('aprovar')}>Aprovar ({pendentes.length})</button>
          <button className={'subtab'+(sub==='perguntas'?' on':'')} onClick={()=>setSub('perguntas')}>Perguntas</button>
          <button className={'subtab'+(sub==='relatorio'?' on':'')} onClick={()=>setSub('relatorio')}>Relatório</button>
        </div>
      </div>

      {sub==='aprovar' && <React.Fragment>
        {pendentes.length===0 && <div className="card muted">Nenhum check list aguardando aprovação.</div>}
        {pendentes.map(ck=>
          <div className="card row" key={ck.id}>
            <div className="grow"><b>{primeiroNome(ck.motorista)}</b><div className="muted">{dataBR(ck.data)} · {ck.placa} · {ck.respostas.filter(r=>r.resp==='NC').length} não conformidade(s)</div></div>
            <button className="btn btn-s btn-sm" onClick={()=>setVer(ck)}>Analisar</button>
          </div>)}
      </React.Fragment>}

      {sub==='perguntas' && <React.Fragment>
        <div className="card">
          <h3 style={{marginBottom:10}}>{editandoPergunta?'Editar pergunta':'Nova pergunta'}</h3>
          <div className="form-grid">
            <div style={{gridColumn:'1/-1'}}><label>Texto</label><input value={novaPerg.texto} onChange={e=>setNovaPerg({...novaPerg, texto:e.target.value})} placeholder="Ex.: Cintas e catracas de amarração em condições"/></div>
            <div><label>TipoVeículo</label>
              <select value={novaPerg.frota} onChange={e=>setNovaPerg({...novaPerg, frota:e.target.value})}>
                <option value="leve">FROTA LEVE</option>
                <option value="pesada">FROTA PESADA</option>
              </select>
            </div>
            <div><label>Grupo</label>
              <select value={novaPerg.grupo} onChange={e=>setNovaPerg({...novaPerg, grupo:e.target.value})}>
                <option value="Anomalias estéticas">Anomalias estéticas</option>
                <option value="Anomalias mecânicas">Anomalias mecânicas</option>
                <option value="Anomalias elétricas">Anomalias elétricas</option>
              </select>
            </div>
            <div><label>Frequência</label>
              <select value={novaPerg.frequencia} onChange={e=>setNovaPerg({...novaPerg, frequencia:e.target.value})}>
                <option value="Diária">Diária</option>
                <option value="Semanal">Semanal</option>
                <option value="Mensal">Mensal</option>
              </select>
            </div>
            <div><label>Ordem dentro do grupo</label><input type="number" min="0" step="1" value={novaPerg.ordem} onChange={e=>setNovaPerg({...novaPerg,ordem:e.target.value})}/></div>
            <div><label>Resposta obrigatória?</label><select value={novaPerg.obrigatoria?'s':'n'} onChange={e=>setNovaPerg({...novaPerg, obrigatoria:e.target.value==='s'})}><option value="s">Sim</option><option value="n">Não</option></select></div>
            <div><label>Foto obrigatória se NC?</label><select value={novaPerg.fotoNC?'s':'n'} onChange={e=>setNovaPerg({...novaPerg, fotoNC:e.target.value==='s'})}><option value="n">Não</option><option value="s">Sim</option></select></div>
          </div>
          <div className="row" style={{marginTop:12}}><button className="btn btn-p" onClick={salvarPergunta}>{editandoPergunta?'Salvar alterações':'Adicionar pergunta'}</button>{editandoPergunta&&<button className="btn btn-s" onClick={()=>{setEditandoPergunta(null);setNovaPerg(perguntaVazia);}}>Cancelar edição</button>}</div>
        </div>
        <div className="row" style={{flexWrap:'wrap'}}>
          <div className="subtabs grow">
            {[['pesada','Frota pesada'],['leve','Frota leve'],['todas','Todas']].map(([v,l])=>
              <button key={v} className={'subtab'+(fFrota===v?' on':'')} onClick={()=>setFFrota(v)}>{l}</button>)}
          </div>
          <button className="btn btn-s btn-sm" disabled={carregandoCatalogo} onClick={carregarCatalogo}>
            {carregandoCatalogo?'Atualizando...':'Atualizar do SharePoint'}
          </button>
        </div>
        <div className="card" style={{overflowX:'auto'}}>
          <table>
            <thead><tr><th>Pergunta</th><th>Grupo</th><th>Ordem</th><th>TipoVeículo</th><th>Frequência</th><th>Obrigatória</th><th>Foto se NC</th><th>Ativa</th><th>Ações</th></tr></thead>
            <tbody>{st.perguntas.filter(p=>fFrota==='todas'||p.frota===fFrota||p.frota==='ambas').map(p=>
              <tr key={p.id} style={{opacity:p.ativa?1:.45}}>
                <td>{p.texto}</td>
                <td className="muted">{p.grupo}</td>
                <td><b>{p.ordem}</b></td>
                <td><span className="tag tag-neutro">{p.frota==='leve'?'Frota leve':'Frota pesada'}</span></td>
                <td><span className="tag tag-neutro">{p.frequencia || 'Diária'}</span></td>
                <td>{p.obrigatoria?'Sim':'Não'}</td>
                <td>{p.fotoNC?'Sim':'Não'}</td>
                <td><span className={'tag '+(p.ativa?'tag-ok':'tag-neg')}>{p.ativa?'Ativa':'Inativa'}</span></td>
                <td><div className="row" style={{gap:6,flexWrap:'nowrap'}}><button className="btn btn-s btn-sm" onClick={()=>iniciarEdicao(p)}>Editar</button><button className={'btn btn-sm '+(p.ativa?'btn-s':'btn-p')} onClick={()=>alternarPergunta(p)}>{p.ativa?'Inativar':'Reativar'}</button></div></td>
              </tr>)}</tbody>
          </table>
        </div>
      </React.Fragment>}

      {sub==='relatorio' && <React.Fragment>
        <div className="row" style={{flexWrap:'wrap'}}>
          <input type="month" aria-label="Filtrar relatório por mês" style={{width:'auto'}} value={fMes} onChange={e=>setFMes(e.target.value)}/>
          <select style={{width:'auto'}} value={fPlaca} onChange={e=>setFPlaca(e.target.value)}>
            <option value="todas">Todas as placas</option>
            {placas.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
          <select style={{width:'auto'}} value={fMot} onChange={e=>setFMot(e.target.value)}>
            <option value="todos">Todos os motoristas</option>
            {motoristas.map(m=><option key={m} value={m}>{primeiroNome(m)}</option>)}
          </select>
          <select style={{width:'auto'}} value={fStatus} onChange={e=>setFStatus(e.target.value)}>
            <option value="todos">Todos os status</option><option value="pendente">Aguardando análise</option><option value="aprovado">Aprovados</option><option value="reprovado">Reprovados</option>
          </select>
          <button className="btn btn-g btn-sm" onClick={()=>{setFMes(mesAtualFiltro);setFPlaca('todas');setFMot('todos');setFStatus('todos')}}>Limpar filtros</button>
        </div>
        <div className="totais">
          <div className="card"><div className="v num">{totaisRelatorio.total}</div><div className="l">Checklists</div></div>
          <div className="card"><div className="v num" style={{color:'var(--mata)'}}>{totaisRelatorio.aprovados}</div><div className="l">Aprovados</div></div>
          <div className="card"><div className="v num" style={{color:totaisRelatorio.reprovados?'var(--erro)':'var(--mata)'}}>{totaisRelatorio.reprovados}</div><div className="l">Reprovados</div></div>
          <div className="card"><div className="v num">{totaisRelatorio.pendentes}</div><div className="l">Aguardando</div></div>
        </div>
        {relatorio.length===0 && <div className="card muted">Nenhum checklist encontrado nos filtros selecionados.</div>}
        {relatorio.map(ck=>
          <div className="card row" key={ck.id}>
            <div className="grow"><b>{primeiroNome(ck.motorista)}</b> <span className="muted">· {dataBR(ck.data)} · {ck.placa}</span>
              <div className="muted">{ck.respostas.filter(r=>r.resp==='NC').length} NC · {ck.respostas.filter(r=>r.foto).length} foto(s)</div></div>
            <StatusTag s={ck.status}/>
            <button className="btn btn-g btn-sm" onClick={()=>setVer(ck)}>Ver</button>
          </div>)}
      </React.Fragment>}

      {ver && !reprovando &&
        <ChecklistDetalhe ck={ver} perguntas={st.perguntas} onClose={()=>setVer(null)}
          acoes={ver.status==='pendente' &&
            <div className="row">
              <button className="btn btn-d grow" onClick={()=>setReprovando(ver)}>Reprovar</button>
              <button className="btn btn-p grow" onClick={()=>decidir(ver,'aprovado')}>Aprovar</button>
            </div>}/>}
      {reprovando &&
        <Modal titulo="Reprovar check list" onClose={()=>setReprovando(null)}>
          <label>Motivo (o motorista verá e deverá refazer)</label>
          <textarea rows="3" value={motivoRep} onChange={e=>setMotivoRep(e.target.value)} placeholder="Ex.: foto do vazamento não permite identificar o local; refazer com foto mais próxima."/>
          <button className="btn btn-d" style={{width:'100%', marginTop:12}} onClick={()=>{ if(!motivoRep.trim()){toast('Informe o motivo da reprovação.'); return;} decidir(reprovando,'reprovado',motivoRep.trim()); }}>Confirmar reprovação</button>
        </Modal>}
    </React.Fragment>
  );
}

/* ================= ADM: PREMIAÇÃO (metas + descontos) ================= */
function AdmPremiacao({st, setSt, toast}){
  const [sub,setSub]=useState('metas');
  const [edit,setEdit]=useState(null);
  const [editTipo,setEditTipo]=useState(null);
  const [competencia,setCompetencia]=useState(MES_ATUAL.slice(3)+'-'+MES_ATUAL.slice(0,2));
  const [fMotorista,setFMotorista]=useState('');
  const [fTipoMeta,setFTipoMeta]=useState('');
  const [painel,setPainel]=useState({metas:[],tiposVeiculo:[],descontos:[],elegiveis:[],pendencias:{}});
  const [novoDesc,setNovoDesc]=useState({motoristaId:'',motoristaNome:'',categoria:'Multas',situacao:'Sem ocorrência',quantidade:0,valor:0,percentual:0,dataOcorrencia:'',motivo:'',exibir:true});
  const categorias=['Notificação / Advertência','Multas','Auditoria Interna'];
  const carregar=async()=>{try{const r=await ApiService.admPremiacao(competencia);setPainel(r);setSt(s=>({...s,metas:r.metas||s.metas}));}catch(e){toast('Erro ao carregar premiação: '+e.message)}};
  useEffect(()=>{carregar();},[competencia]);
  const statusMeta=m=>{
    const hoje=HOJE;
    if(m.ativo===false)return'Inativa';
    if(m.vigIni&&hoje<m.vigIni)return'Programada';
    if(m.vigFim&&hoje>m.vigFim)return'Finalizada';
    return'Ativa';
  };
  const salvarMeta=async(e)=>{
    if(e&&e.preventDefault)e.preventDefault();
    if(!edit.tipo||!edit.vigIni||!edit.vigFim){toast('Preencha tipo de veículo e vigência.');return;}
    try{await ApiService.salvarMeta(edit);setEdit(null);await carregar();toast('Meta salva no SharePoint.');}
    catch(e){toast('Erro ao salvar meta: '+e.message)}
  };
  const addDesc=async()=>{
    if(!novoDesc.motoristaId){toast('Selecione o motorista.');return;}
    if(novoDesc.motoristaId==='__TODOS__'){
      if(novoDesc.situacao!=='Sem ocorrência'){toast('O lançamento em massa é permitido somente para Sem ocorrência.');return;}
      const pendentes=((painel.pendencias||{})[novoDesc.categoria]||[]);
      if(!pendentes.length){toast('Não há motoristas pendentes nesta categoria.');return;}
      try{
        for(const motorista of pendentes){
          await ApiService.salvarDesconto({
            ...novoDesc,itemId:undefined,competencia,
            motoristaId:motorista.motoristaId,motoristaNome:motorista.nome,
            quantidade:0,valor:0,percentual:0,dataOcorrencia:'',motivo:''
          });
        }
        await carregar();
        setNovoDesc({motoristaId:'',motoristaNome:'',categoria:novoDesc.categoria,situacao:'Sem ocorrência',quantidade:0,valor:0,percentual:0,dataOcorrencia:'',motivo:'',exibir:true});
        toast(`${pendentes.length} motoristas foram lançados como Sem ocorrência.`);
      }catch(e){toast('Erro no lançamento em massa: '+e.message)}
      return;
    }
    if(novoDesc.situacao==='Com ocorrência'&&!Number(novoDesc.valor)&&!Number(novoDesc.percentual)){toast('Informe o valor ou percentual do desconto.');return;}
    try{await ApiService.salvarDesconto({...novoDesc,competencia});await carregar();setNovoDesc({motoristaId:'',motoristaNome:'',categoria:'Multas',situacao:'Sem ocorrência',quantidade:0,valor:0,percentual:0,dataOcorrencia:'',motivo:'',exibir:true});toast(novoDesc.itemId?'Lançamento atualizado no SharePoint.':'Conferência salva no SharePoint.');}
    catch(e){toast('Erro ao salvar conferência: '+e.message)}
  };
  const tiposMeta=[...new Map(
    (painel.tiposVeiculo||[]).filter(Boolean).map(tipo=>[chaveTipo(tipo),tipo])
  ).values()].sort((a,b)=>a.localeCompare(b,'pt-BR'));
  const tipoPelaChave=chave=>{
    const normalizarChave=v=>chaveTipo(v).replace(/[^A-Z0-9]/g,'');
    const prefixo=normalizarChave(String(chave||'').split('|')[0]);
    if(!prefixo)return'';
    return tiposMeta.find(t=>normalizarChave(t)===prefixo)||'';
  };
  const tipoOficial=(tipo,chave)=>tiposMeta.find(t=>chaveTipo(t)===chaveTipo(tipo))||tipo||tipoPelaChave(chave);
  const metas=(painel.metas||[])
    .map(m=>({...m,tipo:tipoOficial(m.tipo,m.chave)}))
    .filter(m=>!fTipoMeta||chaveTipo(m.tipo)===chaveTipo(fTipoMeta));
  const elegiveis=(painel.elegiveis||[]).filter(u=>!fMotorista||u.motoristaId===fMotorista);
  return (
    <React.Fragment>
      <div className="row" style={{flexWrap:'wrap'}}>
        <h2 className="grow">Premiação</h2>
        <div className="subtabs">
          <button className={'subtab'+(sub==='metas'?' on':'')} onClick={()=>setSub('metas')}>Metas</button>
          <button className={'subtab'+(sub==='desc'?' on':'')} onClick={()=>setSub('desc')}>Descontos</button>
        </div>
      </div>

      {sub==='metas' && <React.Fragment>
        <div className="row" style={{marginBottom:12,flexWrap:'wrap'}}>
          <select style={{width:'auto'}} value={fTipoMeta} onChange={e=>setFTipoMeta(e.target.value)}>
            <option value="">Todos os tipos de veículo</option>
            {tiposMeta.map(tipo=><option key={tipo} value={tipo}>{tipo}</option>)}
          </select>
          <div className="grow"></div>
          <button className="btn btn-p" onClick={()=>setEdit({tipo:'',start:0,meta:0,valorMeta:0,pctStart:0,pctMeta:0,teto:0,vigIni:HOJE,vigFim:HOJE.slice(0,4)+'-12-31',status:'Ativa',ativo:true,observacao:''})}>+ Incluir meta</button>
        </div>
        <div className="card" style={{overflowX:'auto'}}>
          <table>
            <thead><tr><th>Tipo de veículo</th><th className="td-num">Start</th><th className="td-num">Meta</th><th className="td-num">Na meta</th><th className="td-num">% start→meta</th><th className="td-num">% acima meta</th><th className="td-num">Teto mensal</th><th>Vigência</th><th>Status</th><th></th></tr></thead>
            <tbody>{metas.map(m=>
              <tr key={m.itemId||m.id}>
                <td><b>{m.tipo}</b></td>
                <td className="td-num num">{brl(m.start)}</td>
                <td className="td-num num">{brl(m.meta)}</td>
                <td className="td-num num">{brl(m.valorMeta)}</td>
                <td className="td-num num">{m.pctStart}%</td>
                <td className="td-num num">{m.pctMeta}%</td>
                <td className="td-num num">{brl(m.teto)}</td>
                <td className="muted">{dataBR(m.vigIni)} — {dataBR(m.vigFim)}</td>
                <td><span className="tag tag-neutro">{statusMeta(m)}</span></td>
                <td><button className="btn btn-s btn-sm" onClick={()=>setEdit({...m})}>Editar</button></td>
              </tr>)}</tbody>
          </table>
        </div>
        <div className="aviso-box">As metas são gravadas por vigência. Cadastre uma nova meta para um novo período sem alterar o histórico finalizado.</div>
      </React.Fragment>}

      {sub==='desc' && <React.Fragment>
        <div className="row" style={{marginBottom:12,flexWrap:'wrap'}}>
          <input type="month" style={{width:'auto'}} value={competencia} onChange={e=>setCompetencia(e.target.value)}/>
          <select style={{width:'auto'}} value={fMotorista} onChange={e=>setFMotorista(e.target.value)}><option value="">Todos os motoristas</option>{(painel.elegiveis||[]).map(u=><option key={u.motoristaId} value={u.motoristaId}>{u.nome}</option>)}</select>
        </div>
        <div className="totais">
          {categorias.map(c=><div className="card" key={c}><div className="v num">{((painel.pendencias||{})[c]||[]).filter(u=>!fMotorista||u.motoristaId===fMotorista).length}</div><div className="l">{c}<br/><span className="muted">pendentes</span></div></div>)}
        </div>
        <div className="card">
          <h3 style={{marginBottom:10}}>Conferir desconto</h3>
          {novoDesc.itemId&&<div className="aviso-box" style={{marginBottom:12}}>Editando lançamento existente. Ao salvar, o registro será atualizado sem criar duplicidade.</div>}
          <div className="form-grid">
            <div><label>Motorista</label>
              <select value={novoDesc.motoristaId} onChange={e=>{const u=(painel.elegiveis||[]).find(x=>x.motoristaId===e.target.value);setNovoDesc({...novoDesc,motoristaId:e.target.value,motoristaNome:u?.nome||''})}}>
                <option value="">Selecionar...</option>
                {!novoDesc.itemId&&<option value="__TODOS__">✓ Todos os motoristas pendentes</option>}
                {elegiveis.map(u=><option key={u.motoristaId} value={u.motoristaId}>{u.nome}</option>)}
              </select></div>
            <div><label>Categoria</label><select value={novoDesc.categoria} onChange={e=>setNovoDesc({...novoDesc,categoria:e.target.value})}>{categorias.map(c=><option key={c}>{c}</option>)}</select></div>
            <div><label>Situação</label><select value={novoDesc.situacao} onChange={e=>setNovoDesc({...novoDesc,situacao:e.target.value,motoristaId:e.target.value==='Com ocorrência'&&novoDesc.motoristaId==='__TODOS__'?'':novoDesc.motoristaId})}><option>Sem ocorrência</option><option>Com ocorrência</option></select></div>
            <div><label>Quantidade</label><input type="number" min="0" value={novoDesc.quantidade} onChange={e=>setNovoDesc({...novoDesc,quantidade:e.target.value})}/></div>
            {novoDesc.situacao==='Com ocorrência'&&<React.Fragment>
              <div><label>Valor do desconto (R$)</label><input type="number" min="0" value={novoDesc.valor} onChange={e=>setNovoDesc({...novoDesc,valor:e.target.value})}/></div>
              <div><label>Percentual (%)</label><input type="number" min="0" max="100" value={novoDesc.percentual} onChange={e=>setNovoDesc({...novoDesc,percentual:e.target.value})}/></div>
              <div><label>Data da ocorrência</label><input type="date" value={novoDesc.dataOcorrencia} onChange={e=>setNovoDesc({...novoDesc,dataOcorrencia:e.target.value})}/></div>
              <div style={{gridColumn:'1/-1'}}><label>Motivo</label><textarea value={novoDesc.motivo} onChange={e=>setNovoDesc({...novoDesc,motivo:e.target.value})}/></div>
            </React.Fragment>}
          </div>
          {novoDesc.motoristaId==='__TODOS__'&&
            <div className="aviso-box" style={{marginTop:12}}>
              Serão gravados como <b>Sem ocorrência</b> todos os {((painel.pendencias||{})[novoDesc.categoria]||[]).length} motoristas ainda pendentes em {novoDesc.categoria}. Quem já foi conferido não será alterado.
            </div>}
          <div className="row" style={{marginTop:12}}>
            <button className="btn btn-p" onClick={addDesc}>{novoDesc.itemId?'Salvar edição':'Salvar conferência'}</button>
            {novoDesc.itemId&&<button className="btn btn-s" onClick={()=>setNovoDesc({motoristaId:'',motoristaNome:'',categoria:'Multas',situacao:'Sem ocorrência',quantidade:0,valor:0,percentual:0,dataOcorrencia:'',motivo:'',exibir:true})}>Cancelar edição</button>}
          </div>
        </div>
        <div className="card" style={{overflowX:'auto'}}>
          <table>
            <thead><tr><th>Motorista</th><th>Mês</th><th>Item</th><th className="td-num">Valor</th><th>Origem</th><th></th></tr></thead>
            <tbody>{(painel.descontos||[]).filter(d=>!fMotorista||d.motoristaId===fMotorista).map(d=>
              <tr key={d.itemId}>
                <td><b>{d.motoristaNome}</b></td>
                <td>{competencia.slice(5,7)+'/'+competencia.slice(0,4)}</td><td>{d.categoria}</td>
                <td className="td-num num" style={{color:d.valor?'var(--erro)':'var(--cinza)'}}>{brl(-Math.abs(d.valor||0))}</td>
                <td className="muted">{d.situacao}</td>
                <td><button className="btn btn-s btn-sm" onClick={()=>setNovoDesc({
                  itemId:d.itemId,motoristaId:d.motoristaId,motoristaNome:d.motoristaNome,
                  categoria:d.categoria,situacao:d.situacao||'Sem ocorrência',
                  quantidade:d.quantidade||0,valor:d.valor||0,percentual:d.percentual||0,
                  dataOcorrencia:d.dataOcorrencia||'',motivo:d.motivo||'',exibir:d.exibir!==false
                })}>Editar</button></td>
              </tr>)}</tbody>
          </table>
        </div>
      </React.Fragment>}

      {edit &&
        <Modal titulo={edit.itemId?'Editar meta':'Incluir meta'} onClose={()=>setEdit(null)}>
          <div className="form-grid">
            <div style={{gridColumn:'1/-1'}}><label>Tipo de veículo</label>
              <select value={edit.tipo} onChange={e=>setEdit({...edit,tipo:e.target.value})}>
                <option value="">Selecionar...</option>
                {edit.tipo&&!tiposMeta.includes(edit.tipo)&&<option value={edit.tipo}>{edit.tipo}</option>}
                {tiposMeta.map(tipo=><option key={tipo} value={tipo}>{tipo}</option>)}
              </select>
              {!tiposMeta.length&&
                <div className="aviso-box" style={{marginTop:8}}>
                  Nenhum tipo foi encontrado nas placas da Frota Pesada. Cadastros consultados: {(painel.diagnosticoVeiculos||{}).totalCadastro||0}; placas pesadas identificadas: {(painel.diagnosticoVeiculos||{}).totalFrotaPesada||0}.
                </div>}
            </div>
            <div><label>Start (R$)</label><input type="number" value={edit.start} onChange={e=>setEdit({...edit, start:Number(e.target.value)})}/></div>
            <div><label>Meta (R$)</label><input type="number" value={edit.meta} onChange={e=>setEdit({...edit, meta:Number(e.target.value)})}/></div>
            <div><label>Valor na meta (R$)</label><input type="number" value={edit.valorMeta} onChange={e=>setEdit({...edit, valorMeta:Number(e.target.value)})}/></div>
            <div><label>Teto mensal (R$)</label><input type="number" value={edit.teto} onChange={e=>setEdit({...edit, teto:Number(e.target.value)})}/></div>
            <div><label>% start→meta</label><input type="number" value={edit.pctStart} onChange={e=>setEdit({...edit, pctStart:Number(e.target.value)})}/></div>
            <div><label>% acima da meta</label><input type="number" value={edit.pctMeta} onChange={e=>setEdit({...edit, pctMeta:Number(e.target.value)})}/></div>
            <div><label>Vigência início</label><input type="date" value={edit.vigIni} onChange={e=>setEdit({...edit, vigIni:e.target.value})}/></div>
            <div><label>Vigência fim</label><input type="date" value={edit.vigFim} onChange={e=>setEdit({...edit, vigFim:e.target.value})}/></div>
            <div><label>Ativa</label><select value={edit.ativo===false?'nao':'sim'} onChange={e=>setEdit({...edit,ativo:e.target.value==='sim'})}><option value="sim">Sim</option><option value="nao">Não</option></select></div>
          </div>
          <button type="button" className="btn btn-p" style={{width:'100%', marginTop:14}} onClick={salvarMeta}>Salvar meta</button>
        </Modal>}
    </React.Fragment>
  );
}

/* ================= ADM: CADASTROS (usuários + frota) ================= */
function AdmCadastros({st, setSt, toast}){
  const [sub,setSub]=useState('usuarios');
  const [edit,setEdit]=useState(null);
  const [editTipo,setEditTipo]=useState(null);
  const [editPlaca,setEditPlaca]=useState(null);
  const [editVinculo,setEditVinculo]=useState(null);
  const [senhaVisivel,setSenhaVisivel]=useState(false);
  const [cad,setCad]=useState({usuarios:[],tiposVeiculo:[],veiculos:[],vinculos:[]});
  const proximoUsuarioId=()=>{const maior=cad.usuarios.reduce((m,u)=>{const x=String(u.usuarioId||'').match(/^USU-(\d+)$/i);return x?Math.max(m,Number(x[1])):m;},0);return 'USU-'+String(maior+1).padStart(3,'0');};
  const carregar=async()=>{try{const r=await ApiService.admCadastros();setCad({usuarios:r.usuarios||[],tiposVeiculo:r.tiposVeiculo||[],veiculos:r.veiculos||[],vinculos:r.vinculos||[]});}catch(e){toast('Erro ao carregar cadastros: '+e.message);}};
  useEffect(()=>{carregar();},[]);
  const salvarUser=async()=>{
    const login=String(edit.login||'').trim().toLowerCase(), usuarioId=String(edit.usuarioId||'').trim().toUpperCase();
    if(!String(edit.nome||'').trim()||!login||!usuarioId){ toast('Nome, UsuarioID e usuário são obrigatórios.'); return; }
    if(cad.usuarios.some(u=>u.itemId!==edit.itemId&&String(u.login||'').trim().toLowerCase()===login)){toast('O usuário '+login+' já está cadastrado.');return;}
    if(cad.usuarios.some(u=>u.itemId!==edit.itemId&&String(u.usuarioId||'').trim().toUpperCase()===usuarioId)){toast('O UsuarioID '+usuarioId+' já está cadastrado.');return;}
    const novaSenha=String(edit.novaSenha||'');
    if(!edit.itemId&&!novaSenha){toast('Digite ou gere a senha inicial.');return;}
    if(novaSenha&&edit.perfil==='MOTORISTA'&&!/^\d{6}$/.test(novaSenha)){toast('Motorista deve usar PIN com exatamente 6 números.');return;}
    if(novaSenha&&edit.perfil!=='MOTORISTA'&&novaSenha.length<8){toast('Administrador e visualizador devem usar ao menos 8 caracteres.');return;}
    try{await ApiService.salvarUsuario({...edit,login,usuarioId,acessoCargas:edit.perms.cargas,acessoPremiacao:edit.perms.premiacao,acessoChecklist:edit.perms.checklist,acessoHistorico:edit.perms.historico,acessoAdministracao:edit.perms.administracao});setEdit(null);await carregar();if(novaSenha)window.alert('Acesso salvo com sucesso.\n\nUsuário: '+login+'\nSenha temporária: '+novaSenha+'\n\nCopie agora: ela não poderá ser visualizada novamente.');else toast('Usuário salvo no SharePoint.');}catch(e){toast('Erro ao salvar usuário: '+e.message);}
  };
  const gerarSenha=()=>{
    if(edit.perfil==='MOTORISTA'){
      const n=crypto.getRandomValues(new Uint32Array(1))[0]%1000000;
      setEdit({...edit,novaSenha:String(n).padStart(6,'0')});
    }else{
      const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#';
      const rnd=crypto.getRandomValues(new Uint8Array(12));
      setEdit({...edit,novaSenha:Array.from(rnd,b=>chars[b%chars.length]).join('')});
    }
    setSenhaVisivel(true);
  };
  const alterarStatusUsuario=async(u)=>{
    if(!window.confirm((u.ativo?'Inativar':'Reativar')+' o usuário '+u.nome+'?')) return;
    try{
      await ApiService.salvarUsuario({...u,ativo:!u.ativo});
      await carregar();
      toast('Usuário '+u.nome+' '+(u.ativo?'inativado':'reativado')+' com sucesso.');
    }catch(e){toast('Erro ao alterar status do usuário: '+e.message);}
  };
  const salvarPlaca=async()=>{
    const placa=String(editPlaca.placa||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
    if(!placa){toast('Informe a placa do veículo.');return;}
    const repetida=cad.veiculos.some(v=>v.itemId!==editPlaca.itemId&&String(v.placa||'').toUpperCase().replace(/[^A-Z0-9]/g,'')===placa);
    if(repetida){toast('A placa '+placa+' já está cadastrada.');return;}
    try{await ApiService.salvarVeiculo({...editPlaca,placa});setEditPlaca(null);await carregar();toast('Veículo salvo no SharePoint.');}catch(e){toast('Erro ao salvar veículo: '+e.message);}
  };
  const salvarTipo=async()=>{
    if(!String(editTipo.nome||'').trim()){toast('Informe o nome do tipo de veículo.');return;}
    try{await ApiService.salvarTipoVeiculo(editTipo);setEditTipo(null);await carregar();toast('Tipo de veículo salvo no SharePoint.');}
    catch(e){toast('Erro ao salvar tipo de veículo: '+e.message);}
  };
  const alterarStatusTipo=async(t)=>{
    if(!window.confirm((t.ativo?'Inativar':'Reativar')+' o tipo '+t.nome+'?'))return;
    try{await ApiService.salvarTipoVeiculo({...t,ativo:!t.ativo});await carregar();toast('Tipo de veículo atualizado.');}
    catch(e){toast('Erro ao alterar tipo de veículo: '+e.message);}
  };
  const alterarStatusPlaca=async(f)=>{
    const acao=f.ativo?'inativar':'reativar';
    if(!window.confirm((f.ativo?'Inativar':'Reativar')+' a placa '+f.placa+'?')) return;
    try{
      await ApiService.salvarVeiculo({...f,ativo:!f.ativo});
      await carregar();
      toast('Placa '+f.placa+' '+(f.ativo?'inativada':'reativada')+' com sucesso.');
    }catch(e){toast('Erro ao '+acao+' placa: '+e.message);}
  };
  const salvarVinculo=async()=>{const u=cad.usuarios.find(x=>x.itemId===editVinculo.usuarioItemId),v=cad.veiculos.find(x=>x.itemId===editVinculo.veiculoItemId);if(!u||!v){toast('Selecione usuário e veículo.');return;}try{await ApiService.salvarVinculo({...editVinculo,usuarioId:u.usuarioId,titulo:u.usuarioId+' - '+v.placa});setEditVinculo(null);await carregar();toast('Vínculo salvo no SharePoint.');}catch(e){toast('Erro ao salvar vínculo: '+e.message);}};
  /* A edição da placa deve sempre exibir o cadastro central. O status ou a
     classificação da frota não podem apagar as opções do seletor; o valor
     antigo continua identificado separadamente como histórico. */
  const tiposAtivos=[...new Map(cad.tiposVeiculo
    .filter(t=>String(t.nome||'').trim())
    .map(t=>[chaveTipo(t.nome),t])
  ).values()]
    .sort((a,b)=>String(a.nome).localeCompare(String(b.nome),'pt-BR'));
  return (
    <React.Fragment>
      <div className="row" style={{flexWrap:'wrap'}}>
        <h2 className="grow">Cadastros</h2>
        <div className="subtabs">
          <button className={'subtab'+(sub==='usuarios'?' on':'')} onClick={()=>setSub('usuarios')}>Usuários e acessos</button>
          <button className={'subtab'+(sub==='tipos'?' on':'')} onClick={()=>setSub('tipos')}>Tipos de veículo</button>
          <button className={'subtab'+(sub==='frota'?' on':'')} onClick={()=>setSub('frota')}>Veículos</button>
          <button className={'subtab'+(sub==='vinculos'?' on':'')} onClick={()=>setSub('vinculos')}>Vínculos</button>
        </div>
      </div>

      {sub==='usuarios' && <React.Fragment>
        <div><button className="btn btn-p" onClick={()=>{setSenhaVisivel(false);setEdit({nome:'',usuarioId:proximoUsuarioId(),login:'',telefone:'',perfil:'MOTORISTA',tipoFrotaAcesso:'FROTA PESADA',ativo:true,novaSenha:'',perms:{cargas:true,premiacao:true,checklist:true,historico:true,administracao:false}})}}>+ Novo usuário</button></div>
        <div className="card" style={{overflowX:'auto'}}>
          <table>
            <thead><tr><th>Nome</th><th>UsuarioID</th><th>Usuário</th><th>Perfil</th><th>Senha</th><th>Cargas</th><th>Premiação</th><th>Check list</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>{cad.usuarios.map(u=>
              <tr key={u.itemId}>
                <td><b>{u.nome}</b></td>
                <td className="muted">{u.usuarioId}</td>
                <td className="muted">{u.login}</td>
                <td><span className="tag tag-ok">{u.perfil}</span></td>
                <td>{u.senhaCadastrada?'Cadastrada':'Pendente'}</td>
                {u.perfil==='ADMINISTRADOR' ? <td colSpan="3" className="muted">acesso administrativo</td> : <React.Fragment>
                  <td>{u.acessoCargas?'✓':'—'}</td><td>{u.acessoPremiacao?'✓':'—'}</td><td>{u.acessoChecklist?'✓':'—'}</td>
                </React.Fragment>}
                <td><span className={'tag '+(u.ativo?'tag-ok':'tag-neutro')}>{u.ativo?'Ativo':'Inativo'}</span></td>
                <td><div className="row" style={{gap:6,flexWrap:'nowrap'}}><button className="btn btn-s btn-sm" onClick={()=>{setSenhaVisivel(false);setEdit({...u,novaSenha:'',perms:{cargas:u.acessoCargas,premiacao:u.acessoPremiacao,checklist:u.acessoChecklist,historico:u.acessoHistorico,administracao:u.acessoAdministracao}})}}>Editar</button><button className={'btn btn-sm '+(u.ativo?'btn-s':'btn-p')} onClick={()=>alterarStatusUsuario(u)}>{u.ativo?'Inativar':'Reativar'}</button></div></td>
              </tr>)}</tbody>
          </table>
        </div>
      </React.Fragment>}

      {sub==='tipos' && <React.Fragment>
        <div><button className="btn btn-p" onClick={()=>setEditTipo({nome:'',tipoFrota:'FROTA PESADA',pbtKg:0,capacidadeCargaKg:0,toleranciaSuperiorKg:0,limiteInferiorKg:0,exigeAprovacaoAbaixo:false,ativo:true,observacao:''})}>+ Novo tipo de veículo</button></div>
        <div className="card" style={{overflowX:'auto'}}>
          <table><thead><tr><th>Tipo de veículo</th><th>Frota</th><th className="td-num">PBT</th><th className="td-num">Capacidade</th><th className="td-num">Tolerância superior</th><th className="td-num">Limite inferior</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody>{cad.tiposVeiculo.map(t=><tr key={t.itemId}><td><b>{t.nome}</b></td><td>{t.tipoFrota}</td><td className="td-num num">{Number(t.pbtKg||0).toLocaleString('pt-BR')} kg</td><td className="td-num num">{Number(t.capacidadeCargaKg||0).toLocaleString('pt-BR')} kg</td><td className="td-num num">{Number(t.toleranciaSuperiorKg||0).toLocaleString('pt-BR')} kg</td><td className="td-num num">{Number(t.limiteInferiorKg||0).toLocaleString('pt-BR')} kg</td><td><span className={'tag '+(t.ativo?'tag-ok':'tag-neutro')}>{t.ativo?'Ativo':'Inativo'}</span></td><td><div className="row" style={{gap:6,flexWrap:'nowrap'}}><button className="btn btn-s btn-sm" onClick={()=>setEditTipo({...t})}>Editar</button><button className={'btn btn-sm '+(t.ativo?'btn-s':'btn-p')} onClick={()=>alterarStatusTipo(t)}>{t.ativo?'Inativar':'Reativar'}</button></div></td></tr>)}</tbody></table>
        </div>
        <div className="aviso-box">Este cadastro é a fonte única dos tipos usados nos veículos, nas metas e nos filtros. Os limites de peso ficam armazenados para a futura auditoria, sem gerar bloqueio nesta etapa.</div>
      </React.Fragment>}

      {sub==='frota' && <React.Fragment>
        <div><button className="btn btn-p" onClick={()=>setEditPlaca({placa:'',tipoFrota:'FROTA PESADA',tipoModelo:'',ativo:true,usoCompartilhado:false})}>+ Novo veículo</button></div>
        <div className="card" style={{overflowX:'auto'}}>
          <table>
            <thead><tr><th>Placa</th><th>Frota</th><th>Tipo / modelo</th><th>Uso</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>{cad.veiculos.map(f=>
              <tr key={f.placa}>
                <td><b className="num">{f.placa}</b></td>
                <td><span className="tag tag-ok">{f.tipoFrota||'Não informado'}</span></td>
                <td>{f.tipoModelo}</td>
                <td>{f.usoCompartilhado?'Compartilhado':'Por vínculo'}</td>
                <td><span className={'tag '+(f.ativo?'tag-ok':'tag-neutro')}>{f.ativo?'Ativo':'Inativo'}</span></td>
                <td><div className="row" style={{gap:6,flexWrap:'nowrap'}}><button className="btn btn-s btn-sm" onClick={()=>setEditPlaca({...f})}>Editar</button><button className={'btn btn-sm '+(f.ativo?'btn-s':'btn-p')} onClick={()=>alterarStatusPlaca(f)}>{f.ativo?'Inativar':'Reativar'}</button></div></td>
              </tr>)}</tbody>
          </table>
        </div>
        <div className="aviso-box">A classificação da frota define qual modelo de check list o veículo recebe. Nos pesados, o tipo de veículo define também a meta da premiação; o vínculo com o motorista é usado na importação quando a planilha não traz a coluna de motorista.</div>
      </React.Fragment>}

      {sub==='vinculos' && <React.Fragment>
        <div><button className="btn btn-p" onClick={()=>setEditVinculo({vinculoId:'VIN-'+String(cad.vinculos.length+1).padStart(3,'0'),usuarioItemId:'',veiculoItemId:'',dataInicio:HOJE,dataFim:'',ativo:true,principal:true,observacao:''})}>+ Novo vínculo</button></div>
        <div className="card" style={{overflowX:'auto'}}><table><thead><tr><th>Vínculo</th><th>Usuário</th><th>Veículo</th><th>Início</th><th>Fim</th><th>Principal</th><th>Status</th><th></th></tr></thead><tbody>{cad.vinculos.map(v=><tr key={v.itemId}><td>{v.vinculoId}</td><td><b>{v.usuarioNome}</b></td><td>{v.placa}</td><td>{dataBR((v.dataInicio||'').slice(0,10))}</td><td>{v.dataFim?dataBR(v.dataFim.slice(0,10)):'—'}</td><td>{v.principal?'Sim':'Não'}</td><td><span className={'tag '+(v.dataFim?'tag-neutro':v.ativo?'tag-ok':'tag-neg')}>{v.dataFim?'Finalizado':v.ativo?'Ativo':'Inativo'}</span></td><td><button className="btn btn-s btn-sm" onClick={()=>setEditVinculo({...v})}>Editar</button></td></tr>)}</tbody></table></div>
      </React.Fragment>}

      {edit &&
        <Modal titulo={edit.nome?'Editar usuário':'Novo usuário'} onClose={()=>setEdit(null)}>
          <div style={{display:'flex', flexDirection:'column', gap:12}}>
            <div><label>Nome completo</label><input value={edit.nome} onChange={e=>setEdit({...edit, nome:e.target.value})}/></div>
            <div className="form-grid"><div><label>UsuarioID</label><input value={edit.usuarioId} onChange={e=>setEdit({...edit,usuarioId:e.target.value.toUpperCase()})}/></div>
              <div><label>Usuário</label><input value={edit.login} onChange={e=>setEdit({...edit, login:e.target.value.toLowerCase()})}/></div>
              <div><label>Telefone</label><input value={edit.telefone||''} onChange={e=>setEdit({...edit,telefone:e.target.value})}/></div>
            </div>
            <div><label>Perfil</label>
              <select value={edit.perfil} onChange={e=>setEdit({...edit, perfil:e.target.value})}>
                <option>MOTORISTA</option><option>ADMINISTRADOR</option><option>VISUALIZADOR</option>
              </select></div>
            <div><label>Acesso à frota</label><select value={edit.tipoFrotaAcesso} onChange={e=>setEdit({...edit,tipoFrotaAcesso:e.target.value})}><option>FROTA PESADA</option><option>FROTA LEVE</option><option>AMBAS</option></select></div>
            <div><label>Status do usuário</label><select value={edit.ativo?'s':'n'} onChange={e=>setEdit({...edit,ativo:e.target.value==='s'})}><option value="s">Ativo</option><option value="n">Inativo</option></select></div>
            <div>
              <label>{edit.itemId?(edit.senhaCadastrada?'Redefinir senha (deixe vazio para manter)':'Definir senha'):'Senha inicial'}</label>
              <div className="row" style={{gap:8}}>
                <input className="grow" type={senhaVisivel?'text':'password'} value={edit.novaSenha||''} onChange={e=>setEdit({...edit,novaSenha:e.target.value})} placeholder={edit.perfil==='MOTORISTA'?'6 números':'mínimo 8 caracteres'}/>
                <button type="button" className="btn btn-s btn-sm" onClick={()=>setSenhaVisivel(!senhaVisivel)}>{senhaVisivel?'Ocultar':'Ver'}</button>
                <button type="button" className="btn btn-s btn-sm" onClick={gerarSenha}>Gerar</button>
              </div>
              <div className="muted" style={{fontSize:12,marginTop:5}}>A senha aparece somente agora. Depois de salva, será possível apenas redefini-la.</div>
            </div>
            {edit.perfil!=='ADMINISTRADOR' && <div>
              <label>Módulos liberados</label>
              <div className="subtabs">
                {[['cargas','Cargas'],['premiacao','Premiação'],['checklist','Check list']].map(([k,l])=>
                  <button key={k} className={'subtab'+(edit.perms[k]?' on':'')}
                    onClick={()=>setEdit({...edit, perms:{...edit.perms, [k]:!edit.perms[k]}})}>{l}</button>)}
              </div>
            </div>}
            <button className="btn btn-p" onClick={salvarUser}>Salvar usuário</button>
          </div>
        </Modal>}
      {editPlaca &&
        <Modal titulo={'Placa '+editPlaca.placa} onClose={()=>setEditPlaca(null)}>
          <div style={{display:'flex', flexDirection:'column', gap:12}}>
            <div><label>Frota</label>
              <select value={editPlaca.tipoFrota} onChange={e=>setEditPlaca({...editPlaca, tipoFrota:e.target.value})}>
                <option>FROTA PESADA</option><option>FROTA LEVE</option>
              </select></div>
            <div><label>Placa</label><input value={editPlaca.placa} disabled={!!editPlaca.itemId} onChange={e=>setEditPlaca({...editPlaca,placa:e.target.value.toUpperCase()})}/></div><div><label>Tipo / modelo</label>
                <select value={editPlaca.tipoModelo} onChange={e=>setEditPlaca({...editPlaca, tipoModelo:e.target.value})}>
                  <option value="">Selecionar...</option>
                  {editPlaca.tipoModelo&&!tiposAtivos.some(t=>chaveTipo(t.nome)===chaveTipo(editPlaca.tipoModelo))&&<option value={editPlaca.tipoModelo}>{editPlaca.tipoModelo} (histórico)</option>}
                  {tiposAtivos.map(t=><option key={t.itemId} value={t.nome}>{t.nome}</option>)}
                </select></div><div><label>Uso compartilhado?</label><select value={editPlaca.usoCompartilhado?'s':'n'} onChange={e=>setEditPlaca({...editPlaca,usoCompartilhado:e.target.value==='s'})}><option value="n">Não — exige vínculo</option><option value="s">Sim</option></select></div>
            <div><label>Status do veículo</label><select value={editPlaca.ativo?'s':'n'} onChange={e=>setEditPlaca({...editPlaca,ativo:e.target.value==='s'})}><option value="s">Ativo</option><option value="n">Inativo</option></select></div>
            <button className="btn btn-p" onClick={salvarPlaca}>Salvar placa</button>
          </div>
        </Modal>}
      {editVinculo && <Modal titulo="Vínculo usuário × veículo" onClose={()=>setEditVinculo(null)}><div style={{display:'flex',flexDirection:'column',gap:12}}><div><label>Usuário</label><select value={editVinculo.usuarioItemId} onChange={e=>setEditVinculo({...editVinculo,usuarioItemId:e.target.value})}><option value="">Selecionar...</option>{cad.usuarios.filter(u=>u.ativo).map(u=><option key={u.itemId} value={u.itemId}>{u.nome}</option>)}</select></div><div><label>Veículo</label><select value={editVinculo.veiculoItemId} onChange={e=>setEditVinculo({...editVinculo,veiculoItemId:e.target.value})}><option value="">Selecionar...</option>{cad.veiculos.filter(v=>v.ativo&&!v.usoCompartilhado).map(v=><option key={v.itemId} value={v.itemId}>{v.placa}</option>)}</select></div><div className="form-grid"><div><label>Início</label><input type="date" value={(editVinculo.dataInicio||'').slice(0,10)} onChange={e=>setEditVinculo({...editVinculo,dataInicio:e.target.value})}/></div><div><label>Fim</label><input type="date" value={(editVinculo.dataFim||'').slice(0,10)} onChange={e=>setEditVinculo({...editVinculo,dataFim:e.target.value,ativo:!e.target.value})}/></div></div><div><label>Principal?</label><select value={editVinculo.principal?'s':'n'} onChange={e=>setEditVinculo({...editVinculo,principal:e.target.value==='s'})}><option value="s">Sim</option><option value="n">Não</option></select></div><div><label>Observação</label><textarea value={editVinculo.observacao||''} onChange={e=>setEditVinculo({...editVinculo,observacao:e.target.value})}/></div><button className="btn btn-p" onClick={salvarVinculo}>Salvar vínculo</button></div></Modal>}
      {editTipo && <Modal titulo={editTipo.itemId?'Editar tipo de veículo':'Novo tipo de veículo'} onClose={()=>setEditTipo(null)}>
        <div className="form-grid">
          <div style={{gridColumn:'1/-1'}}><label>Nome do tipo de veículo</label><input value={editTipo.nome} onChange={e=>setEditTipo({...editTipo,nome:e.target.value.toUpperCase()})}/></div>
          <div><label>Frota</label><select value={editTipo.tipoFrota} onChange={e=>setEditTipo({...editTipo,tipoFrota:e.target.value})}><option>FROTA PESADA</option><option>FROTA LEVE</option></select></div>
          <div><label>Status</label><select value={editTipo.ativo?'s':'n'} onChange={e=>setEditTipo({...editTipo,ativo:e.target.value==='s'})}><option value="s">Ativo</option><option value="n">Inativo</option></select></div>
          <div><label>PBT (kg)</label><input type="number" min="0" value={editTipo.pbtKg} onChange={e=>setEditTipo({...editTipo,pbtKg:Number(e.target.value)})}/></div>
          <div><label>Capacidade de carga (kg)</label><input type="number" min="0" value={editTipo.capacidadeCargaKg} onChange={e=>setEditTipo({...editTipo,capacidadeCargaKg:Number(e.target.value)})}/></div>
          <div><label>Tolerância superior (kg)</label><input type="number" min="0" value={editTipo.toleranciaSuperiorKg} onChange={e=>setEditTipo({...editTipo,toleranciaSuperiorKg:Number(e.target.value)})}/></div>
          <div><label>Limite inferior (kg)</label><input type="number" min="0" value={editTipo.limiteInferiorKg} onChange={e=>setEditTipo({...editTipo,limiteInferiorKg:Number(e.target.value)})}/></div>
          <div><label>Exige aprovação abaixo?</label><select value={editTipo.exigeAprovacaoAbaixo?'s':'n'} onChange={e=>setEditTipo({...editTipo,exigeAprovacaoAbaixo:e.target.value==='s'})}><option value="n">Não</option><option value="s">Sim</option></select></div>
          <div style={{gridColumn:'1/-1'}}><label>Observação</label><textarea value={editTipo.observacao||''} onChange={e=>setEditTipo({...editTipo,observacao:e.target.value})}/></div>
        </div>
        <button className="btn btn-p" style={{width:'100%',marginTop:14}} onClick={salvarTipo}>Salvar tipo de veículo</button>
      </Modal>}
    </React.Fragment>
  );
}

/* ================= SHELL ADM ================= */
function AdmApp({st, setSt, user, onSair, toast}){
  const dados = usarDadosMensais(st);
  const [aba,setAba]=useState('painel');
  const abas=[['painel','Painel'],['importar','Importar'],['contest','Contestações'],['check','Check list'],['prem','Premiação'],['cad','Cadastros']];
  useEffect(()=>{
    if(CONFIG.MODO_DEMONSTRACAO) return;
    ApiService.admListarChecklists().then(r=>{
      const vindos=(r.itens||r.checklists||[]).map(x=>({
        id:x.protocolo||x.id, idLocal:x.idLocal||'', motorista:x.motoristaNome||'', placa:x.placa||'',
        frota:String(x.tipoChecklist||'').toUpperCase().includes('LEVE')?'leve':'pesada',
        data:String(x.dataHoraLocal||'').slice(0,10),
        status:String(x.status||'PENDENTE').toLowerCase()==='aprovado'?'aprovado':(String(x.status||'').toLowerCase()==='reprovado'?'reprovado':'pendente'),
        motivoReprova:x.motivoReprova||x.motivoReprovacao||'', km:String(x.quilometragem||''), combustivel:'',
        respostas:(x.respostas||[]).map(rr=>({pid:String(rr.idPergunta||''),resp:rr.resposta||'NA',obs:rr.observacao||'',foto:rr.linkFoto||null}))
      }));
      setSt(s=>({...s,checklists:vindos}));
    }).catch(e=>toast('Falha ao carregar checklists do SharePoint: '+e.message));
  },[]);
  return (
    <div className="ashell">
      <div className="atop">
        <div className="atop-in">
          <div className="marca">Bocchi <em>Frota</em></div>
          <nav className="anav grow">
            {abas.map(([id,nome])=><button key={id} className={aba===id?'on':''} onClick={()=>setAba(id)}>{nome}</button>)}
          </nav>
          <button className="btn btn-sm" style={{color:'rgba(255,255,255,.8)'}} onClick={onSair}>Sair</button>
        </div>
      </div>
      <div className="abody">
        {aba==='painel' && <AdmPainel st={st} dados={dados}/>}
        {aba==='importar' && <AdmImportar st={st} setSt={setSt} toast={toast}/>}
        {aba==='contest' && <AdmContestacoes st={st} setSt={setSt} toast={toast}/>}
        {aba==='check' && <AdmChecklist st={st} setSt={setSt} toast={toast}/>}
        {aba==='prem' && <AdmPremiacao st={st} setSt={setSt} toast={toast}/>}
        {aba==='cad' && <AdmCadastros st={st} setSt={setSt} toast={toast}/>}
      </div>
    </div>
  );
}

/* ================= APP ================= */
function App(){
  const [st,setSt]=useState(estadoInicial);
  const [user,setUser]=useState(null);
  const [toastMsg,setToastMsg]=useState('');
  const tRef = useRef(null);
  const toast=(m)=>{ setToastMsg(m); clearTimeout(tRef.current); tRef.current=setTimeout(()=>setToastMsg(''),3200); };
  const userAtual = user ? st.usuarios.find(u=>u.id===user.id) || user : null;
  const perfilAtual = String(userAtual?.perfil||'').trim().toLowerCase();
  const ehMotorista = perfilAtual==='motorista';
  const ehAdministrador = perfilAtual==='adm' || perfilAtual==='administrador';
  const ehVisualizador = perfilAtual==='visualizador';
  return (
    <React.Fragment>
      {!userAtual && <Login st={st} onLogin={setUser}/>}
      {userAtual && ehMotorista && <MotoristaApp st={st} setSt={setSt} user={userAtual} onSair={()=>{ApiService.sair();setUser(null);}} toast={toast}/>}
      {userAtual && (ehAdministrador || ehVisualizador) && <AdmApp st={st} setSt={setSt} user={userAtual} onSair={()=>{ApiService.sair();setUser(null);}} toast={toast}/>}
      {userAtual && !ehMotorista && !ehAdministrador && !ehVisualizador && (
        <div className="login-wrap"><div className="login-card">
          <div className="marca">Bocchi <em>Frota</em></div>
          <div className="erro-box">O perfil “{userAtual.perfil||'não informado'}” não está configurado para acesso.</div>
          <button className="btn btn-p" onClick={()=>setUser(null)}>Voltar ao login</button>
        </div></div>
      )}
      <Toast msg={toastMsg}/>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
